  <script>
    // ─────────────────────────────────────────────────────────────
    // Print: populate floor mosaic before printing, clean up after
    // ─────────────────────────────────────────────────────────────
    (function () {

      // ── Step 1: collect visible wood-tile images from the current viewport ──
      function getVisibleTileSrcs() {
        const grid = document.getElementById('grid');
        if (!grid) return [];
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        return Array.from(grid.querySelectorAll('.card'))
          .filter(card => {
            const r = card.getBoundingClientRect();
            return r.top < vh && r.bottom > 0 && r.left < vw && r.right > 0;
          })
          .map(card => {
            const img  = card.querySelector('.card-wood-img');
            if (!img) return null;
            const src = img.getAttribute('src');
            if (!src || src.trim() === '') return null;
            // Capture the tile's natural aspect ratio (height/width) so planks
            // stay tall & narrow like real flooring, not square
            const r = card.getBoundingClientRect();
            const ar = r.width > 0 ? r.height / r.width : 2.5; // height:width ratio
            return { src: src, alt: img.alt || '', ar };
          })
          .filter(Boolean);
      }

      // ── Step 2: build the flooring mosaic in the print zone ─────────────────
      function buildFloorGrid(tiles) {
        const zone   = document.getElementById('print-floor-zone');
        const gridEl = document.getElementById('print-floor-grid');
        if (!zone || !gridEl) return;
        gridEl.innerHTML = '';
        if (tiles.length === 0) return;

        // Get actual columns count on screen dynamically and double it
        const grid = document.getElementById('grid');
        const numCols = grid ? (parseInt(window.getComputedStyle(grid).columnCount) || 8) : 8;
        const NUM_COLS = numCols * 2;

        // Zone is 105mm × 105mm (fixed in print.css)
        const ZONE_H_MM = 105;

        // Column width in mm (zone width is 105mm)
        const colW_mm = 105 / NUM_COLS;

        // Calculate average aspect ratio of visible tiles, scale it up to be long
        let totalAR = 0;
        tiles.forEach(t => { totalAR += t.ar || 2.5; });
        const avgAR = tiles.length > 0 ? (totalAR / tiles.length) : 2.5;

        // Make the planks tall for a realistic wood plank look
        const arFactor = Math.max(avgAR * 2.8, 8.0);

        // Plank height in mm
        const plankH_mm = colW_mm * arFactor;

        gridEl.style.cssText = 'position:relative; width:100%; height:100%; overflow:hidden;';

        // Stagger stair: each successive column shifts up by 0.25 * plankH, cycling [0, 0.25, 0.5, 0.75]
        const STAIR_STEP = 0.25;

        // Maximum upward shift any column will get (0.75 * plankH for col index 3, 7, 11, 15)
        const maxStagger_mm = 0.75 * plankH_mm;

        // planksNeeded must cover the full zone height PLUS the maximum stagger shift
        // so even the most-shifted column reaches the bottom of the zone.
        const planksNeeded = Math.ceil((ZONE_H_MM + maxStagger_mm) / plankH_mm) + 2;

        // Pre-calculate tile selection grid to avoid horizontal, vertical, and diagonal repeats
        const selectedGrid = [];
        for (let col = 0; col < NUM_COLS; col++) {
          selectedGrid[col] = [];
        }

        // Build a balanced pool: every tile index appears the same number of times (±1)
        const totalCells = NUM_COLS * planksNeeded;
        const pool = [];
        for (let i = 0; i < totalCells; i++) {
          pool.push(i % tiles.length);
        }

        // Deterministic LCG seeded random number generator
        function seededRandomGenerator(seed) {
          let s = seed;
          return function() {
            s = (s * 9301 + 49297) % 233280;
            return s / 233280;
          };
        }

        // Deterministically shuffle the pool using LCG
        const rand = seededRandomGenerator(12345);
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          const temp = pool[i];
          pool[i] = pool[j];
          pool[j] = temp;
        }

        let poolIdx = 0;
        for (let row = 0; row < planksNeeded; row++) {
          for (let col = 0; col < NUM_COLS; col++) {
            let chosenIdx = -1;

            if (tiles.length > 1) {
              // 1. Full adjacency constraints (vertical + horizontal + diagonal)
              for (let i = poolIdx; i < pool.length; i++) {
                const t = pool[i];
                const isVerticalRepeat   = row > 0            && selectedGrid[col][row - 1] === t;
                const isHorizontalRepeat = col > 0            && selectedGrid[col - 1][row] === t;
                const isDiagLeft         = col > 0 && row > 0 && selectedGrid[col - 1][row - 1] === t;
                const isDiagRight        = col < NUM_COLS - 1 && row > 0 && selectedGrid[col + 1][row - 1] === t;

                if (!isVerticalRepeat && !isHorizontalRepeat && !isDiagLeft && !isDiagRight) {
                  chosenIdx = i;
                  break;
                }
              }

              // 2. Relax diagonal constraints
              if (chosenIdx === -1) {
                for (let i = poolIdx; i < pool.length; i++) {
                  const t = pool[i];
                  const isVerticalRepeat   = row > 0 && selectedGrid[col][row - 1] === t;
                  const isHorizontalRepeat = col > 0 && selectedGrid[col - 1][row] === t;
                  if (!isVerticalRepeat && !isHorizontalRepeat) { chosenIdx = i; break; }
                }
              }

              // 3. Only vertical constraint
              if (chosenIdx === -1) {
                for (let i = poolIdx; i < pool.length; i++) {
                  if (row === 0 || selectedGrid[col][row - 1] !== pool[i]) { chosenIdx = i; break; }
                }
              }

              // 4. Fallback
              if (chosenIdx === -1) chosenIdx = poolIdx;

              // Commit: swap chosen to front, record assignment
              const temp = pool[poolIdx];
              pool[poolIdx] = pool[chosenIdx];
              pool[chosenIdx] = temp;
              selectedGrid[col][row] = pool[poolIdx];
            } else {
              selectedGrid[col][row] = 0;
            }
            poolIdx++;
          }
        }

        // Render columns with mm-based sizing (avoids print % resolution bugs)
        const colWidth_mm = 105 / NUM_COLS;
        const totalColH_mm = plankH_mm * planksNeeded;

        for (let col = 0; col < NUM_COLS; col++) {
          const colLeft_mm = col * colWidth_mm;
          const topOffset_mm = -((col * STAIR_STEP) % 1) * plankH_mm;

          const colEl = document.createElement('div');
          colEl.style.cssText = [
            'position:absolute',
            `left:${colLeft_mm.toFixed(3)}mm`,
            `width:${colWidth_mm.toFixed(3)}mm`,
            `top:${topOffset_mm.toFixed(3)}mm`,
            `height:${totalColH_mm.toFixed(3)}mm`,
            'display:flex',
            'flex-direction:column',
            'align-items:stretch',
            'overflow:visible',
          ].join(';');

          for (let i = 0; i < planksNeeded; i++) {
            const tile = tiles[selectedGrid[col][i]];

            const plank = document.createElement('div');
            plank.style.cssText = `flex-shrink:0; width:100%; height:${plankH_mm.toFixed(3)}mm; overflow:hidden;`;

            const img = document.createElement('img');
            img.src         = tile.src;
            img.alt         = tile.alt || '';
            img.crossOrigin = 'anonymous';
            img.style.cssText = 'display:block; width:100%; height:100%; object-fit:cover; object-position:center;';

            plank.appendChild(img);
            colEl.appendChild(plank);
          }

          gridEl.appendChild(colEl);
        }
      }

      window.addEventListener('beforeprint', () => {
        const tiles = getVisibleTileSrcs();
        buildFloorGrid(tiles);

        // Randomly pick green or red doormat
        const doormatImg = document.getElementById('print-doormat-img');
        if (doormatImg) {
          const doormats = [
            'assets/image/green doormat.jpg',
            'assets/image/red doormat.jpg'
          ];
          const chosen = doormats[Math.floor(Math.random() * doormats.length)];
          doormatImg.src = chosen;
        }
      });

      window.addEventListener('afterprint', () => {
        const gridEl = document.getElementById('print-floor-grid');
        if (gridEl) { gridEl.innerHTML = ''; gridEl.removeAttribute('style'); }

        const doormatImg = document.getElementById('print-doormat-img');
        if (doormatImg) { doormatImg.src = ''; }
      });

    })();
  </script>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Config
    // ─────────────────────────────────────────────────────────────
    const AIRTABLE_TOKEN = "patMrJnngETB8Srn9.2291fafcbf0c5009f6cd1bb0fb76f64a4186e03dc379d4ef282b70acd6ed3dea";
    const AIRTABLE_BASE = "app0gYEl62r82qDqK";
    const AIRTABLE_TABLE = "CSM용 시트";

    const FIELDS = {
      nameKo: "장판 이름 (한글)",
      nameEn: "장판 이름 (영어)",
      image: "사진 image",
      thickness: "두께 Thickness",
      softness: "촉감 Softness",
      purpose: "제작 목적 purpose",
      series: "장판 시리즈 series",
      brand: "제조사 brand",
    };

    // Bilingual translations mapping to English
    const brandMap = {
      "LX 하우시스": "LX hausys",
      "현대L&C": "Hyundai L&C",
      "KCC": "KCC"
    };

    const seriesMap = {
      "소리지움": "Sorizium",
      "도담 Dodam": "Dodam",
      "엑스컴포트": "X-comfort",
      "아티움 Artium": "Artium",
      "지아사랑애": "Zia Sarang-ae",
      "시니어": "Senior",
      "숲옥 Sup Auk": "Sup Auk"
    };

    const softnessMap = {
      "폭신": "little squishy",
      "단단": "firm",
      "푹신푹신": "squishy",
      "약간 단단": "slightly firm"
    };

    const purposeMap = {
      "노년층 Assisted living": "Assisted living",
      "실내 주거 전반 General residential": "General residential",
      "아이와 반려동물 Home with pets and kids": "Home with pets and kids",
      "반려동물 Home with pets": "Home with pets",
      "층간소음 Apartment noise reduction": "Apartment noise reduction"
    };

    let isGlobalRevealed = false;

    // Walking sound helper — single play
    function playWalkSound() {
      const snd = document.getElementById("walk-sound");
      if (!snd) return;
      snd.currentTime = 0;
      snd.play().catch(() => {});
    }

    // Walking sound helper — rapid staccato for reveal-all
    function playWalkSoundRapid(cardCount, totalMs) {
      const snd = document.getElementById("walk-sound");
      if (!snd) return;
      // Fewer plays (max 4), compressed + 300ms buffer
      const plays = Math.min(4, Math.max(2, Math.floor(cardCount / 8)));
      const durationMs = totalMs * 0.25 + 600;
      const interval = durationMs / plays;
      for (let i = 0; i < plays; i++) {
        setTimeout(() => {
          const clone = snd.cloneNode();
          clone.volume = 0.4;
          clone.play().catch(() => {});
        }, i * interval);
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Fetch multiple images from Wikimedia Commons
    // ─────────────────────────────────────────────────────────────
    async function fetchWikiImages(query, limit = 3) {
      if (!query) return [];
      const safeQuery = query + ' -nazi -communism -soviet -ussr -insect -bug -spider -moth -portrait -biography -actor -singer -politician -nude -anatomy -sexual -organ -medical -disease -blood -surgery -flesh -tissue -muscle -person -human -man -woman -author -writer -artist -born -died -death -incategory:"Living people"';
      const url = `https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(safeQuery)}&gsrlimit=12&prop=pageimages&format=json&piprop=thumbnail|original&pithumbsize=600&origin=*`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.query?.pages) {
          const validPages = Object.values(data.query.pages)
            .filter(p => p.thumbnail?.source || p.original?.source);

          if (validPages.length > 0) {
            // Prioritize GIFs if available
            const gifs = validPages.filter(p => p.original?.source?.toLowerCase().endsWith('.gif'));
            const others = validPages.filter(p => !p.original?.source?.toLowerCase().endsWith('.gif'));

            // Shuffle both
            gifs.sort(() => Math.random() - 0.5);
            others.sort(() => Math.random() - 0.5);

            // Combine with GIFs first
            const combined = [...gifs, ...others];

            return combined.slice(0, limit).map(p => {
              // If it's a gif, use original source for animation
              if (p.original?.source?.toLowerCase().endsWith('.gif')) return p.original.source;
              return p.thumbnail?.source || p.original?.source;
            });
          }
        }
      } catch (err) { console.error("Wiki API error:", err); }
      return [];
    }

    // ─────────────────────────────────────────────────────────────
    // Build a single card element
    // ─────────────────────────────────────────────────────────────
    function buildCard(record, index) {
      const f = record.fields;
      const name = f[FIELDS.nameEn] || f[FIELDS.nameKo] || "—";

      // Map bilingual fields to English
      const rawBrand = f[FIELDS.brand] || "";
      const brand = brandMap[rawBrand] || rawBrand;

      const rawSeries = f[FIELDS.series] || "";
      const series = seriesMap[rawSeries] || rawSeries;

      const rawSoftness = f[FIELDS.softness] || "";
      const softness = softnessMap[rawSoftness] || rawSoftness;

      const rawPurpose = f[FIELDS.purpose] || "";
      const purpose = purposeMap[rawPurpose] || rawPurpose;

      const thickness = f[FIELDS.thickness] || "—";

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = record.id;

      // Dataset values in English for export tag calculation
      card.dataset.thickness = thickness;
      card.dataset.softness = softness;
      card.dataset.series = series;
      card.dataset.brand = brand;
      card.dataset.purpose = purpose;

      const imgWrap = document.createElement("div");
      imgWrap.className = "card-img-wrap";

      const imageAttachments = f[FIELDS.image];
      let aspectRatio = 1.0;

      if (imageAttachments && imageAttachments.length > 0) {
        const att = imageAttachments[0];
        if (att.width && att.height) {
          aspectRatio = att.width / att.height;
          imgWrap.style.aspectRatio = `${att.width} / ${att.height}`;
        } else {
          imgWrap.style.minHeight = "240px";
        }
      } else {
        const ratios = ["4/5", "3/4", "5/6", "1/1"];
        imgWrap.style.aspectRatio = ratios[index % ratios.length];
        aspectRatio = 0.8;
      }

      // 1. Wood Image Layer (Bottom - STABLE)
      const woodImg = document.createElement("img");
      woodImg.className = "card-wood-img";
      if (imageAttachments && imageAttachments.length > 0) {
        woodImg.src = imageAttachments[0].url;
        woodImg.crossOrigin = "anonymous";
        woodImg.alt = name;
        woodImg.loading = "lazy";
        woodImg.draggable = false;
        imgWrap.appendChild(woodImg);
      } else {
        const hue = Math.floor(Math.random() * 360);
        woodImg.style.display = "none";
        imgWrap.style.backgroundColor = `hsl(${hue}, 20%, 15%)`;
        const label = document.createElement("span");
        label.className = "placeholder-label";
        label.textContent = "—";
        imgWrap.appendChild(label);
      }

      // 2. Concept Image Layer (Top - SWEEPABLE)
      const textLayer = document.createElement("div");
      textLayer.className = "card-text-layer";
      imgWrap.appendChild(textLayer);

      // Determine how many images to stack based on aspect ratio
      let stackCount = 1;
      if (aspectRatio < 0.15) stackCount = 8;
      else if (aspectRatio < 0.22) stackCount = 6;
      else if (aspectRatio < 0.35) stackCount = 4;
      else if (aspectRatio < 0.55) stackCount = 2;

      const searchName = f[FIELDS.nameEn] || f[FIELDS.nameKo];
      if (searchName) {
        fetchWikiImages(searchName, stackCount).then(urls => {
          if (urls.length > 0) {
            urls.forEach(url => {
              const cImg = document.createElement("img");
              cImg.src = url;
              cImg.style.cssText = `width:100%; height:${100 / urls.length}%; object-fit:cover; display:block;`;
              cImg.draggable = false;
              textLayer.appendChild(cImg);
            });
          } else {
            const hue = Math.floor(Math.random() * 360);
            textLayer.style.backgroundColor = `hsl(${hue}, 40%, 40%)`;
          }
        });
      }

      // 3. Hover Overlay (Only visible in revealed state)
      // Styled exactly according to Figma specification node 1:363
      const overlay = document.createElement("div");
      overlay.className = "card-overlay";
      overlay.innerHTML = `
        <div class="overlay-title">${name}</div>
        <div class="overlay-data">
          <div class="overlay-labels">
            <p>brand</p>
            <p>series</p>
            <p>thickness</p>
            <p>softness</p>
            <p>purpose</p>
          </div>
          <div class="overlay-values">
            <p>${brand || "—"}</p>
            <p>${series || "—"}</p>
            <p>${thickness || "—"}</p>
            <p>${softness || "—"}</p>
            <p>${purpose || "—"}</p>
          </div>
        </div>
      `;
      imgWrap.appendChild(overlay);

      card.appendChild(imgWrap);
      return card;
    }

    let cachedPageCanvas = null;
    let isSnapshotting = false;

    async function updatePageSnapshot() {
      if (isSnapshotting) return;
      isSnapshotting = true;
      try {
        const webLayer = document.getElementById("web-layer");
        const canvas = await html2canvas(webLayer, {
          y: window.scrollY,
          x: 0,
          width: window.innerWidth,
          height: window.innerHeight,
          scrollX: 0,
          scrollY: window.scrollY,
          windowWidth: window.innerWidth,
          windowHeight: window.innerHeight,
          backgroundColor: "#0a0a0a",
          useCORS: true,
          scale: 1
        });
        cachedPageCanvas = canvas;
      } catch (err) {
        console.error("Snapshot caching failed:", err);
      } finally {
        isSnapshotting = false;
      }
    }

    let scrollTimeout = null;
    window.addEventListener("scroll", () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(updatePageSnapshot, 200);
    });

    // ─────────────────────────────────────────────────────────────
    // Toggle a single card (reveal ↔ hide)
    // ─────────────────────────────────────────────────────────────
    function revealCard(card) {
      if (card.classList.contains("is-revealed")) {
        // Toggle back: hide this tile again
        card.classList.remove("is-revealed", "is-stable");
        setTimeout(updatePageSnapshot, 300);
      } else {
        card.classList.add("is-revealed");
        setTimeout(() => {
          card.classList.add("is-stable");
          updatePageSnapshot();
        }, 700);
        playWalkSound();
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Reveal All (wave, then button becomes Hide All)
    // ─────────────────────────────────────────────────────────────
    function revealAll() {
      const cards = Array.from(document.querySelectorAll(".card"));
      const totalMs = cards.length * 25 + 700; // match animation total duration
      if (!isGlobalRevealed) {
        cards.forEach((card, i) => {
          setTimeout(() => {
            card.classList.add("is-revealed");
            setTimeout(() => card.classList.add("is-stable"), 700);
          }, i * 25);
        });
        playWalkSoundRapid(cards.length, totalMs);
        isGlobalRevealed = true;
        const btn = document.getElementById("reveal-all-btn");
        if (btn) btn.title = "Hide All";
        setTimeout(updatePageSnapshot, totalMs + 200);
      } else {
        cards.forEach(card => card.classList.remove("is-revealed", "is-stable"));
        isGlobalRevealed = false;
        const btn = document.getElementById("reveal-all-btn");
        if (btn) btn.title = "Reveal All";
        setTimeout(updatePageSnapshot, 400);
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Export Tag / Download Logic
    // ─────────────────────────────────────────────────────────────
    function updateExportTag() {
      let tag = document.getElementById("export-tag");
      if (!tag) {
        tag = document.createElement("div");
        tag.id = "export-tag";
        document.body.appendChild(tag);
      }

      const grid = document.getElementById("grid");
      const visibleCards = Array.from(grid.querySelectorAll(".card")).filter(card => {
        const rect = card.getBoundingClientRect();
        return rect.top < window.innerHeight && rect.bottom > 0;
      });

      if (visibleCards.length > 0) {
        const mode = (arr) => {
          const counts = {};
          let maxCount = 0, maxItem = "—";
          arr.forEach(item => {
            if (!item) return;
            counts[item] = (counts[item] || 0) + 1;
            if (counts[item] > maxCount) {
              maxCount = counts[item]; maxItem = item;
            }
          });
          return maxItem;
        };

        let totalThick = 0, countThick = 0;
        const softnesses = [], series = [];

        visibleCards.forEach(c => {
          const t = parseFloat(c.dataset.thickness);
          if (!isNaN(t)) { totalThick += t; countThick++; }
          if (c.dataset.softness) softnesses.push(c.dataset.softness);
          if (c.dataset.series) series.push(c.dataset.series);
        });

        const avgThick = countThick > 0 ? (totalThick / countThick).toFixed(1) + "mm" : "—";
        const modeSoft = mode(softnesses);
        const modeSeri = mode(series);

        tag.innerHTML = `
          <div class="tag-header">
            <span class="tag-title">MY FLOORING COLLECTION</span>
            <span class="tag-id">MIX ${Date.now().toString().slice(-6)}</span>
          </div>
          <div class="tag-body">
            <div class="tag-row"><strong>Avg Thickness</strong> <span>${avgThick}</span></div>
            <div class="tag-row"><strong>Softness</strong> <span>${modeSoft}</span></div>
            <div class="tag-row"><strong>Main Series</strong> <span>${modeSeri}</span></div>
          </div>
        `;
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Drag Swap
    // ─────────────────────────────────────────────────────────────
    function initDragSwap(grid) {
      let dragSrc = null, clone = null;
      let startX = 0, startY = 0, cloneOffX = 0, cloneOffY = 0;

      function createClone(card) {
        const rect = card.getBoundingClientRect();
        const c = card.cloneNode(true);
        c.id = "drag-clone";
        c.style.cssText = `position:fixed; width:${rect.width}px; height:${rect.height}px; left:${rect.left}px; top:${rect.top}px; pointer-events:none; z-index:999; opacity:0.88; transform:rotate(1.5deg) scale(1.04); box-shadow:0 16px 48px rgba(0,0,0,0.6); overflow:hidden;`;
        const ov = c.querySelector(".card-overlay");
        if (ov) ov.style.opacity = "0";
        document.body.appendChild(c);
        return c;
      }

      // Proper two-node DOM swap
      function swapCards(a, b) {
        const aParent = a.parentNode;
        const bParent = b.parentNode;
        const aNext = a.nextSibling === b ? b.nextSibling : a.nextSibling;
        const bNext = b.nextSibling === a ? a.nextSibling : b.nextSibling;
        if (aParent === bParent) {
          // same parent — use a placeholder
          const placeholder = document.createComment("");
          aParent.insertBefore(placeholder, a);
          aParent.insertBefore(a, b);
          aParent.insertBefore(b, placeholder);
          aParent.removeChild(placeholder);
        }
      }

      grid.addEventListener("pointerdown", e => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        if (e.target.closest("#info-toggle") || e.target.closest("#info-panel") ||
            e.target.closest("#download-btn") || e.target.closest("#reveal-all-btn") ||
            e.target.closest("#print-btn")) return;

        const card = e.target.closest(".card");
        if (!card) return;

        startX = e.clientX; startY = e.clientY;
        const rect = card.getBoundingClientRect();
        cloneOffX = e.clientX - rect.left;
        cloneOffY = e.clientY - rect.top;

        let dragStarted = false;

        function onMove(ev) {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          if (!dragStarted && Math.sqrt(dx * dx + dy * dy) < 6) return;
          if (!dragStarted) {
            dragStarted = true;
            dragSrc = card;
            card.classList.add("card-dragging");
            clone = createClone(card);
          }
          ev.preventDefault();
          if (clone) {
            clone.style.left = (ev.clientX - cloneOffX) + "px";
            clone.style.top  = (ev.clientY - cloneOffY) + "px";
          }
          // Highlight target
          grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
          if (clone) clone.style.display = "none";
          const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest(".card");
          if (clone) clone.style.display = "";
          if (target && target !== dragSrc) target.classList.add("card-ghost");
        }

        function onUp(ev) {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup",   onUp);
          if (dragStarted) {
            grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
            if (clone) clone.style.display = "none";
            const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest(".card");
            if (clone) clone.style.display = "";
            if (target && target !== dragSrc) {
              swapCards(dragSrc, target);
              setTimeout(updatePageSnapshot, 50);
            }
            dragSrc.classList.remove("card-dragging");
            clone?.remove(); clone = null; dragSrc = null;
          } else {
            // Simple click → reveal only this tile
            revealCard(card);
          }
        }
        window.addEventListener("pointermove", onMove, { passive: false });
        window.addEventListener("pointerup",   onUp);
      });
    }

    // ─────────────────────────────────────────────────────────────

    async function fetchAirtable() {

      const res = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
      if (!res.ok) throw new Error(`Airtable error ${res.status}`);
      const data = await res.json(); return data.records;
    }

    // ─────────────────────────────────────────────────────────────
    // Rubber Page Peeling Canvas Physics
    // ─────────────────────────────────────────────────────────────
    let peelCanvas = null;
    let peelCtx = null;
    let peelWidth = 0;
    let peelHeight = 0;

    const peelCols = 12;
    const peelRows = 12;
    const peelPoints = [];
    const peelSprings = [];

    let draggedNode = null;
    let isPeelingActive = false;
    let peelAnimationId = null;

    // Initialize mass-spring physics grid
    function initPeelMesh(w, h) {
      peelPoints.length = 0;
      peelSprings.length = 0;
      peelWidth = w;
      peelHeight = h;

      for (let r = 0; r < peelRows; r++) {
        for (let c = 0; c < peelCols; c++) {
          const u = c / (peelCols - 1);
          const v = r / (peelRows - 1);
          const x = u * w;
          const y = v * h;
          peelPoints.push({
            x: x, y: y,
            ox: x, oy: y, // Rest / original position
            u: u, v: v,   // Normalized coordinates
            vx: 0, vy: 0,
            fx: 0, fy: 0,
            // Pinned at the four corners
            fixed: (c === 0 && r === 0) ||
                   (c === peelCols - 1 && r === 0) ||
                   (c === 0 && r === peelRows - 1) ||
                   (c === peelCols - 1 && r === peelRows - 1)
          });
        }
      }

      function addSpring(i1, i2, stiffness) {
        const p1 = peelPoints[i1];
        const p2 = peelPoints[i2];
        const dx = p1.ox - p2.ox;
        const dy = p1.oy - p2.oy;
        const restLength = Math.sqrt(dx * dx + dy * dy);
        peelSprings.push({ i1, i2, restLength, k: stiffness });
      }

      const kStructural = 0.45;
      const kShear = 0.25;

      for (let r = 0; r < peelRows; r++) {
        for (let c = 0; c < peelCols; c++) {
          const idx = r * peelCols + c;
          // Horizontal
          if (c < peelCols - 1) addSpring(idx, idx + 1, kStructural);
          // Vertical
          if (r < peelRows - 1) addSpring(idx, idx + peelCols, kStructural);
          // Diagonal
          if (c < peelCols - 1 && r < peelRows - 1) {
            addSpring(idx, idx + peelCols + 1, kShear);
            addSpring(idx + 1, idx + peelCols, kShear);
          }
        }
      }
    }

    // Solve affine transform to draw distorted triangles
    function drawWarpedTriangle(ctx, img, x0, y0, x1, y1, x2, y2, u0, v0, u1, v1, u2, v2) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.closePath();
      ctx.clip();

      const den = (u1 - u0) * (v2 - v0) - (u2 - u0) * (v1 - v0);
      if (Math.abs(den) < 0.0001) {
        ctx.restore();
        return;
      }

      const a = ((x1 - x0) * (v2 - v0) - (x2 - x0) * (v1 - v0)) / den;
      const b = ((y1 - y0) * (v2 - v0) - (y2 - y0) * (v1 - v0)) / den;
      const c = ((x2 - x0) * (u1 - u0) - (x1 - x0) * (u2 - u0)) / den;
      const d = ((y2 - y0) * (u1 - u0) - (y1 - y0) * (u2 - u0)) / den;
      const e = x0 - a * u0 - c * v0;
      const f = y0 - b * u0 - d * v0;

      ctx.transform(a, b, c, d, e, f);
      ctx.drawImage(img, 0, 0);
      ctx.restore();
    }

    // Render loop
    function renderPeel() {
      if (!isPeelingActive) return;

      // Update physics
      const springK = 0.22;
      const anchorK = 0.04;
      const damping = 0.86;

      // Reset forces
      for (let i = 0; i < peelPoints.length; i++) {
        peelPoints[i].fx = 0;
        peelPoints[i].fy = 0;
      }

      // Spring forces
      for (let i = 0; i < peelSprings.length; i++) {
        const s = peelSprings[i];
        const p1 = peelPoints[s.i1];
        const p2 = peelPoints[s.i2];
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0.01) {
          const force = (dist - s.restLength) * s.k * springK;
          const fx = (dx / dist) * force;
          const fy = (dy / dist) * force;
          p1.fx += fx;
          p1.fy += fy;
          p2.fx -= fx;
          p2.fy -= fy;
        }
      }

      // Restorative anchor force to original rest position
      for (let i = 0; i < peelPoints.length; i++) {
        const p = peelPoints[i];
        if (p.fixed) continue;
        p.fx += (p.ox - p.x) * anchorK;
        p.fy += (p.oy - p.y) * anchorK;
      }

      // Update velocities and positions
      let maxDistFromRest = 0;
      let maxVel = 0;

      for (let i = 0; i < peelPoints.length; i++) {
        const p = peelPoints[i];
        if (p.fixed) continue;
        if (p === draggedNode) continue;

        p.vx = (p.vx + p.fx) * damping;
        p.vy = (p.vy + p.fy) * damping;
        p.x += p.vx;
        p.y += p.vy;

        const dist = Math.sqrt((p.x - p.ox)**2 + (p.y - p.oy)**2);
        const vel = Math.sqrt(p.vx**2 + p.vy**2);
        if (dist > maxDistFromRest) maxDistFromRest = dist;
        if (vel > maxVel) maxVel = vel;
      }

      // Draw mesh
      peelCtx.clearRect(0, 0, peelWidth, peelHeight);

      const drawSource = cachedPageCanvas || document.getElementById("web-layer");

      for (let r = 0; r < peelRows - 1; r++) {
        for (let c = 0; c < peelCols - 1; c++) {
          const i00 = r * peelCols + c;
          const i10 = r * peelCols + c + 1;
          const i01 = (r + 1) * peelCols + c;
          const i11 = (r + 1) * peelCols + c + 1;

          const p00 = peelPoints[i00];
          const p10 = peelPoints[i10];
          const p01 = peelPoints[i01];
          const p11 = peelPoints[i11];

          const sw = peelWidth;
          const sh = peelHeight;

          drawWarpedTriangle(peelCtx, drawSource,
            p00.x, p00.y, p10.x, p10.y, p01.x, p01.y,
            p00.u * sw, p00.v * sh, p10.u * sw, p10.v * sh, p01.u * sw, p01.v * sh
          );

          drawWarpedTriangle(peelCtx, drawSource,
            p10.x, p10.y, p11.x, p11.y, p01.x, p01.y,
            p10.u * sw, p10.v * sh, p11.u * sw, p11.v * sh, p01.u * sw, p01.v * sh
          );
        }
      }

      // Check if settled (if not dragging and points have returned to rest position)
      if (!draggedNode && maxDistFromRest < 0.8 && maxVel < 0.08) {
        // Reset everything back to exact rest positions
        for (let i = 0; i < peelPoints.length; i++) {
          peelPoints[i].x = peelPoints[i].ox;
          peelPoints[i].y = peelPoints[i].oy;
          peelPoints[i].vx = 0;
          peelPoints[i].vy = 0;
        }
        isPeelingActive = false;
        peelCanvas.style.display = "none";
        document.getElementById("web-layer").style.visibility = "visible";
        cancelAnimationFrame(peelAnimationId);
        return;
      }

      peelAnimationId = requestAnimationFrame(renderPeel);
    }

    // Set up peel event listeners
    function initPeelEvents() {
      peelCanvas = document.getElementById("peel-canvas");
      peelCtx = peelCanvas.getContext("2d");

      function resizeCanvas() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        peelCanvas.width = w;
        peelCanvas.height = h;
        initPeelMesh(w, h);
        setTimeout(updatePageSnapshot, 300);
      }

      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      const edgeThreshold = 45;
      const cornerThreshold = 80;

      window.addEventListener("pointerdown", e => {
        if (isPeelingActive && !draggedNode) return;
        if (e.pointerType === "mouse" && e.button !== 0) return;

        // Ignore UI overlays
        if (e.target.closest("#info-toggle") || e.target.closest("#info-panel") ||
            e.target.closest("#download-btn") || e.target.closest("#reveal-all-btn") ||
            e.target.closest("#print-btn") || e.target.closest(".card")) return;

        const x = e.clientX;
        const y = e.clientY;
        const w = window.innerWidth;
        const h = window.innerHeight;

        const isNearTopLeft = x < cornerThreshold && y < cornerThreshold;
        const isNearTopRight = x > w - cornerThreshold && y < cornerThreshold;
        const isNearBottomLeft = x < cornerThreshold && y > h - cornerThreshold;
        const isNearBottomRight = x > w - cornerThreshold && y > h - cornerThreshold;

        if (isNearTopLeft || isNearTopRight || isNearBottomLeft || isNearBottomRight) return;

        const isNearLeft = x < edgeThreshold;
        const isNearRight = x > w - edgeThreshold;
        const isNearTop = y < edgeThreshold;
        const isNearBottom = y > h - edgeThreshold;

        if (isNearLeft || isNearRight || isNearTop || isNearBottom) {
          e.preventDefault();

          if (!cachedPageCanvas) {
            updatePageSnapshot().then(() => startPeelDrag(x, y));
          } else {
            startPeelDrag(x, y);
          }
        }
      });

      function startPeelDrag(startX, startY) {
        let minD = Infinity;
        let closest = null;

        for (let i = 0; i < peelPoints.length; i++) {
          const p = peelPoints[i];
          const isEdge = (p.u === 0 || p.u === 1 || p.v === 0 || p.v === 1);
          if (isEdge && !p.fixed) {
            const d = Math.sqrt((p.x - startX)**2 + (p.y - startY)**2);
            if (d < minD) {
              minD = d;
              closest = p;
            }
          }
        }

        if (closest) {
          draggedNode = closest;
          draggedNode.x = startX;
          draggedNode.y = startY;

          if (!isPeelingActive) {
            isPeelingActive = true;
            peelCanvas.style.display = "block";
            document.getElementById("web-layer").style.visibility = "hidden";
            renderPeel();
          }

          function onPointerMove(ev) {
            if (draggedNode) {
              draggedNode.x = ev.clientX;
              draggedNode.y = ev.clientY;
            }
          }

          function onPointerUp() {
            draggedNode = null;
            window.removeEventListener("pointermove", onPointerMove);
            window.removeEventListener("pointerup",   onPointerUp);
          }

          window.addEventListener("pointermove", onPointerMove);
          window.addEventListener("pointerup", onPointerUp);
        }
      }
    }

    init();
  </script>
</body>

</html>
