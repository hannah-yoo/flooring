  <!-- ═══════════════════════════════════════════════════════════
       Print-only layout (hidden on screen, shown on Ctrl+P)
       A4: 210mm × 297mm
       Horizontal divider: y = 140mm (~47% from top)
       Vertical divider:   x = 105mm (50% of width)
       Floor zone: x=0, y=140mm, w=105mm, h=105mm (square)
       ═══════════════════════════════════════════════════════════ -->
  <div id="print-layout">

    <!-- Single SVG covers full A4 — SVG strokes always print,
         unlike CSS background-color which browsers may strip.   -->
    <svg id="print-lines" viewBox="0 0 210 297"
         xmlns="http://www.w3.org/2000/svg"
         preserveAspectRatio="none">
      <!-- Vertical dashed line at top half (x=105, y=0 to y=140) -->
      <line x1="105" y1="0" x2="105" y2="140"
            stroke="#000" stroke-width="0.5"
            stroke-dasharray="10 8"
            vector-effect="non-scaling-stroke" />
      <!-- Vertical solid line at bottom half (x=105, y=140 to y=297) -->
      <line x1="105" y1="140" x2="105" y2="297"
            stroke="#000" stroke-width="0.5"
            vector-effect="non-scaling-stroke" />
      <!-- Horizontal dashed line at y=140 (x=0 to x=210) -->
      <line x1="0" y1="140" x2="210" y2="140"
            stroke="#000" stroke-width="0.5"
            stroke-dasharray="10 8"
            vector-effect="non-scaling-stroke" />
      <!-- Diagonal dashed line: centre-intersection (105,140) → right boundary at floor zone bottom height (210,245) -->
      <line x1="105" y1="140" x2="210" y2="245"
            stroke="#000" stroke-width="0.5"
            stroke-dasharray="10 8"
            vector-effect="non-scaling-stroke" />
    </svg>

    <!-- Floor zone: square area bottom-left of the divider lines -->
    <div id="print-floor-zone">
      <div id="print-floor-grid"></div>
    </div>

    <!-- Concrete zone: bare concrete area bottom-right of the divider lines -->
    <div id="print-concrete-zone">
      <img id="print-concrete-img" src="assets/image/concrete.jpg" alt="Concrete" />
    </div>

    <!-- Purple zone: doormat area below floor zone -->
    <div id="print-doormat-zone">
      <img id="print-doormat-img" src="" alt="Doormat" />
    </div>

  </div>

  <!-- Info Toggle & Panel -->
  <button id="info-toggle" aria-label="Info">

  <!-- Download button -->
  <button id="download-btn" title="Download My View" aria-label="Download Viewport">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />

  <script>
    // ─────────────────────────────────────────────────────────────
    // Print: populate floor mosaic before printing, clean up after
    // ─────────────────────────────────────────────────────────────
    (function () {

      // ── Step 1: collect visible wood-tile images from the current viewport ──
      function getVisibleTileSrcs() {
        const grid = document.getElementById('grid');
        if (!grid) return [];
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        return Array.from(grid.querySelectorAll('.card'))
          .filter(card => {
            const r = card.getBoundingClientRect();
            return r.top < vh && r.bottom > 0 && r.left < vw && r.right > 0;
          })
          .map(card => {
            const img  = card.querySelector('.card-wood-img');
            const wrap = card.querySelector('.card-img-wrap');
            if (!img || !img.src) return null;
            // Capture the tile's natural aspect ratio (height/width) so planks
            // stay tall & narrow like real flooring, not square
            const r = card.getBoundingClientRect();
            const ar = r.width > 0 ? r.height / r.width : 2.5; // height:width ratio
            return { src: img.src, alt: img.alt || '', ar };
          })
          .filter(Boolean);
      }

      // ── Step 2: build the flooring mosaic in the print zone ─────────────────
      // Layout: narrow vertical plank columns (matching the web's masonry look)
      // with staggered start offsets between columns for a real-flooring feel.
      function buildFloorGrid(tiles) {
        const zone   = document.getElementById('print-floor-zone');
        const gridEl = document.getElementById('print-floor-grid');
        if (!zone || !gridEl) return;
        gridEl.innerHTML = '';
        if (tiles.length === 0) return;

        // Get actual columns count on screen dynamically and double it
        const grid = document.getElementById('grid');
        const numCols = grid ? (parseInt(window.getComputedStyle(grid).columnCount) || 8) : 8;
        const NUM_COLS = numCols * 2;

        // Stagger offsets: fraction of average plank height each column is shifted up.
        // Mimics how real floor planks are laid offset from each other.
        const STAGGER = [0, 0.42, 0.18, 0.67, 0.31, 0.52, 0.09, 0.78, 0.23, 0.61];

        // Column width as % of zone width
        const colW = 100 / NUM_COLS;

        // Average plank height as % of zone height, preserving tile aspect ratio (avg ar ≈ 2.5)
        const avgPlankH = colW * 2.5;

        gridEl.style.cssText = 'position:relative; width:100%; height:100%; overflow:hidden;';

        const planksNeeded = Math.ceil(130 / avgPlankH) + 2;

        // Simple hash function for pseudo-random deterministic seeding based on grid coordinate
        function seededRandom(x, y) {
          const val = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453123;
          return val - Math.floor(val);
        }

        // Pre-calculate tile selection grid to avoid horizontal, vertical, and diagonal repeats
        const selectedGrid = [];
        for (let col = 0; col < NUM_COLS; col++) {
          selectedGrid[col] = [];
        }

        for (let row = 0; row < planksNeeded; row++) {
          for (let col = 0; col < NUM_COLS; col++) {
            let chosenIdx = 0;
            if (tiles.length > 1) {
              const randValue = seededRandom(col, row);
              const baseSeed = Math.floor(randValue * tiles.length);
              let found = false;
              for (let offset = 0; offset < tiles.length; offset++) {
                const testIdx = (baseSeed + offset) % tiles.length;
                const isVerticalRepeat = row > 0 && selectedGrid[col][row - 1] === testIdx;
                const isHorizontalRepeat = col > 0 && selectedGrid[col - 1][row] === testIdx;
                const isDiagLeftRepeat = col > 0 && row > 0 && selectedGrid[col - 1][row - 1] === testIdx;
                const isDiagRightRepeat = col < NUM_COLS - 1 && row > 0 && selectedGrid[col + 1][row - 1] === testIdx;

                if (!isVerticalRepeat && !isHorizontalRepeat && !isDiagLeftRepeat && !isDiagRightRepeat) {
                  chosenIdx = testIdx;
                  found = true;
                  break;
                }
              }

              if (!found) {
                for (let offset = 0; offset < tiles.length; offset++) {
                  const testIdx = (baseSeed + offset) % tiles.length;
                  const isVerticalRepeat = row > 0 && selectedGrid[col][row - 1] === testIdx;
                  const isHorizontalRepeat = col > 0 && selectedGrid[col - 1][row] === testIdx;

                  if (!isVerticalRepeat && !isHorizontalRepeat) {
                    chosenIdx = testIdx;
                    found = true;
                    break;
                  }
                }
              }

              if (!found && row > 0) {
                for (let offset = 0; offset < tiles.length; offset++) {
                  const testIdx = (baseSeed + offset) % tiles.length;
                  if (selectedGrid[col][row - 1] !== testIdx) {
                    chosenIdx = testIdx;
                    found = true;
                    break;
                  }
                }
              }

              if (!found) {
                chosenIdx = baseSeed;
              }
            } else {
              chosenIdx = 0;
            }
            selectedGrid[col][row] = chosenIdx;
          }
        }

        for (let col = 0; col < NUM_COLS; col++) {
          const colLeft = (col * 100 / NUM_COLS).toFixed(4);
          const colWidthPercent = colW.toFixed(4);

          const colEl = document.createElement('div');
          // Shift column upward by stagger amount so adjacent columns are offset
          const topOffset = -(STAGGER[col % STAGGER.length] * avgPlankH);
          colEl.style.cssText = [
            'position:absolute',
            `left:${colLeft}%`,
            `width:${colWidthPercent}%`,
            `top:${topOffset.toFixed(4)}%`,
            'bottom:-10%',       // small safety buffer
            'display:flex',
            'flex-direction:column',
            'align-items:stretch',
            'overflow:visible',  // parent clips
          ].join(';');

          for (let i = 0; i < planksNeeded; i++) {
            const tileIdx = selectedGrid[col][i];
            const tile = tiles[tileIdx];

            // Vary plank height slightly per row for natural, hand-laid look.
            // Uses the tile's own aspect ratio if available.
            const arFactor  = tile.ar ? Math.min(tile.ar, 4) : 2.5;
            const variation = ((col * 5 + i * 7) % 5 - 2) * 1.5; // ±3%
            const plankH    = (colW * arFactor + variation).toFixed(3);

            const plank = document.createElement('div');
            plank.style.cssText = `flex-shrink:0; width:100%; height:${plankH}%; overflow:hidden;`;

            const img = document.createElement('img');
            img.src         = tile.src;
            img.alt         = tile.alt || '';
            img.crossOrigin = 'anonymous';
            img.style.cssText = 'display:block; width:100%; height:100%; object-fit:cover; object-position:center;';

            plank.appendChild(img);
            colEl.appendChild(plank);
          }

          gridEl.appendChild(colEl);
        }
      }

      window.addEventListener('beforeprint', () => {
        const tiles = getVisibleTileSrcs();
        buildFloorGrid(tiles);

        // Randomly pick green or red doormat
        const doormatImg = document.getElementById('print-doormat-img');
        if (doormatImg) {
          const doormats = [
            'assets/image/green doormat.jpg',
            'assets/image/red doormat.jpg'
          ];
          const chosen = doormats[Math.floor(Math.random() * doormats.length)];
          doormatImg.src = chosen;
        }
      });

      window.addEventListener('afterprint', () => {
        const gridEl = document.getElementById('print-floor-grid');
        if (gridEl) { gridEl.innerHTML = ''; gridEl.removeAttribute('style'); }

        const doormatImg = document.getElementById('print-doormat-img');
        if (doormatImg) { doormatImg.src = ''; }
      });

    })();
  </script>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Config
    // ─────────────────────────────────────────────────────────────
    const AIRTABLE_TOKEN = "patMrJnngETB8Srn9.2291fafcbf0c5009f6cd1bb0fb76f64a4186e03dc379d4ef282b70acd6ed3dea";
    const AIRTABLE_BASE = "app0gYEl62r82qDqK";
    const AIRTABLE_TABLE = "CSM용 시트";

    const FIELDS = {
      nameKo: "장판 이름 (한글)",
      nameEn: "장판 이름 (영어)",
      image: "사진",
      unitSize: "나무판 유닛 1개 너비",
      maxRepeat: "똑같은 디자인이 반복되지 않는 최대 크기",
      density: "단위무늬당 유닛 밀도",
      pattern: "특징",
      thickness: "두께",
      softness: "촉감",
      purpose: "장판의 목적",
      series: "장판 시리즈 이름",
      brand: "출시 회사",
    };

    let isGlobalRevealed = false;

    // Walking sound helper — single play
    function playWalkSound() {
      const snd = document.getElementById("walk-sound");
      if (!snd) return;
      snd.currentTime = 0;
      snd.play().catch(() => {});
    }

    // Walking sound helper — rapid staccato for reveal-all
    function playWalkSoundRapid(cardCount, totalMs) {
      const snd = document.getElementById("walk-sound");
      if (!snd) return;
      // Fewer plays (max 4), compressed + 300ms buffer
      const plays = Math.min(4, Math.max(2, Math.floor(cardCount / 8)));
      const durationMs = totalMs * 0.25 + 600;
      const interval = durationMs / plays;
      for (let i = 0; i < plays; i++) {
        setTimeout(() => {
          const clone = snd.cloneNode();
          clone.volume = 0.4;
          clone.play().catch(() => {});
        }, i * interval);
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Fetch multiple images from Wikimedia Commons
    // ─────────────────────────────────────────────────────────────
    async function fetchWikiImages(query, limit = 3) {
      if (!query) return [];
      const safeQuery = query + ' -nazi -communism -soviet -ussr -insect -bug -spider -moth -portrait -biography -actor -singer -politician -nude -anatomy -sexual -organ -medical -disease -blood -surgery -flesh -tissue -muscle -person -human -man -woman -author -writer -artist -born -died -death -incategory:"Living people"';
      const url = `https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(safeQuery)}&gsrlimit=12&prop=pageimages&format=json&piprop=thumbnail|original&pithumbsize=600&origin=*`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.query?.pages) {
          const validPages = Object.values(data.query.pages)
            .filter(p => p.thumbnail?.source || p.original?.source);

          if (validPages.length > 0) {
            // Prioritize GIFs if available
            const gifs = validPages.filter(p => p.original?.source?.toLowerCase().endsWith('.gif'));
            const others = validPages.filter(p => !p.original?.source?.toLowerCase().endsWith('.gif'));

            // Shuffle both
            gifs.sort(() => Math.random() - 0.5);
            others.sort(() => Math.random() - 0.5);

            // Combine with GIFs first
            const combined = [...gifs, ...others];

            return combined.slice(0, limit).map(p => {
              // If it's a gif, use original source for animation
              if (p.original?.source?.toLowerCase().endsWith('.gif')) return p.original.source;
              return p.thumbnail?.source || p.original?.source;
            });
          }
        }
      } catch (err) { console.error("Wiki API error:", err); }
      return [];
    }

    // ─────────────────────────────────────────────────────────────
    // Build a single card element
    // ─────────────────────────────────────────────────────────────
    function buildCard(record, index) {
      const f = record.fields;
      const name = f[FIELDS.nameEn] || f[FIELDS.nameKo] || "—";

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = record.id;

      card.dataset.density = f[FIELDS.density] || "";
      card.dataset.thickness = f[FIELDS.thickness] || "";
      card.dataset.softness = f[FIELDS.softness] || "";
      card.dataset.series = f[FIELDS.series] || "";

      const imgWrap = document.createElement("div");
      imgWrap.className = "card-img-wrap";

      const imageAttachments = f[FIELDS.image];
      let aspectRatio = 1.0;

      if (imageAttachments && imageAttachments.length > 0) {
        const att = imageAttachments[0];
        if (att.width && att.height) {
          aspectRatio = att.width / att.height;
          imgWrap.style.aspectRatio = `${att.width} / ${att.height}`;
        } else {
          imgWrap.style.minHeight = "240px";
        }
      } else {
        const ratios = ["4/5", "3/4", "5/6", "1/1"];
        imgWrap.style.aspectRatio = ratios[index % ratios.length];
        aspectRatio = 0.8;
      }

      // 1. Wood Image Layer (Bottom - STABLE)
      const woodImg = document.createElement("img");
      woodImg.className = "card-wood-img";
      if (imageAttachments && imageAttachments.length > 0) {
        woodImg.src = imageAttachments[0].url;
        woodImg.crossOrigin = "anonymous";
        woodImg.alt = name;
        woodImg.loading = "lazy";
        woodImg.draggable = false;
        imgWrap.appendChild(woodImg);
      } else {
        const hue = Math.floor(Math.random() * 360);
        woodImg.style.display = "none";
        imgWrap.style.backgroundColor = `hsl(${hue}, 20%, 15%)`;
        const label = document.createElement("span");
        label.className = "placeholder-label";
        label.textContent = "—";
        imgWrap.appendChild(label);
      }

      // 2. Concept Image Layer (Top - SWEEPABLE)
      const textLayer = document.createElement("div");
      textLayer.className = "card-text-layer";
      imgWrap.appendChild(textLayer);

      // Determine how many images to stack based on aspect ratio
      // Initial plan: allow up to 8 wiki images in a single narrow tile
      // Refined: making thresholds stricter to avoid overcrowding on moderately tall tiles
      let stackCount = 1;
      if (aspectRatio < 0.15) stackCount = 8;
      else if (aspectRatio < 0.22) stackCount = 6;
      else if (aspectRatio < 0.35) stackCount = 4;
      else if (aspectRatio < 0.55) stackCount = 2;

      const searchName = f[FIELDS.nameEn] || f[FIELDS.nameKo];
      if (searchName) {
        fetchWikiImages(searchName, stackCount).then(urls => {
          if (urls.length > 0) {
            urls.forEach(url => {
              const cImg = document.createElement("img");
              cImg.src = url;
              cImg.style.cssText = `width:100%; height:${100 / urls.length}%; object-fit:cover; display:block;`;
              cImg.draggable = false;
              textLayer.appendChild(cImg);
            });
          } else {
            const hue = Math.floor(Math.random() * 360);
            textLayer.style.backgroundColor = `hsl(${hue}, 40%, 40%)`;
          }
        });
      }

      // 3. Hover Overlay (Only visible in revealed state)
      const nameKo = f[FIELDS.nameKo] || "";
      const rows = [
        { label: "시리즈", value: f[FIELDS.series] },
        { label: "용도", value: f[FIELDS.purpose] },
        { label: "무늬 너비", value: f[FIELDS.unitSize] },
        { label: "두께", value: f[FIELDS.thickness] },
        { label: "촉감", value: f[FIELDS.softness] },
        { label: "특징", value: f[FIELDS.pattern] },
      ].filter(r => r.value);

      const overlay = document.createElement("div");
      overlay.className = "card-overlay";
      overlay.innerHTML = `
        <p class="overlay-title">${name}${nameKo ? `<span class="overlay-name-ko">${nameKo}</span>` : ""}</p>
        ${f[FIELDS.brand] ? `<p class="overlay-brand">${f[FIELDS.brand]}</p>` : ""}
        ${rows.length > 0 ? `<dl>${rows.map(r => `<dt>${r.label}</dt><dd>${r.value}</dd>`).join("")}</dl>` : ""}
      `;
      imgWrap.appendChild(overlay);

      card.appendChild(imgWrap);
      return card;
    }

    // ─────────────────────────────────────────────────────────────
    // Toggle a single card (reveal ↔ hide)
    // ─────────────────────────────────────────────────────────────
    function revealCard(card) {
      if (card.classList.contains("is-revealed")) {
        // Toggle back: hide this tile again
        card.classList.remove("is-revealed", "is-stable");
      } else {
        card.classList.add("is-revealed");
        setTimeout(() => card.classList.add("is-stable"), 700);
        playWalkSound();
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Reveal All (wave, then button becomes Hide All)
    // ─────────────────────────────────────────────────────────────
    function revealAll() {
      const cards = Array.from(document.querySelectorAll(".card"));
      const totalMs = cards.length * 25 + 700; // match animation total duration
      if (!isGlobalRevealed) {
        cards.forEach((card, i) => {
          setTimeout(() => {
            card.classList.add("is-revealed");
            setTimeout(() => card.classList.add("is-stable"), 700);
          }, i * 25);
        });
        playWalkSoundRapid(cards.length, totalMs);
        isGlobalRevealed = true;
        const btn = document.getElementById("reveal-all-btn");
        if (btn) btn.title = "Hide All";
      } else {
        cards.forEach(card => card.classList.remove("is-revealed", "is-stable"));
        isGlobalRevealed = false;
        const btn = document.getElementById("reveal-all-btn");
        if (btn) btn.title = "Reveal All";
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Export Tag / Download Logic
    // ─────────────────────────────────────────────────────────────
    function updateExportTag() {
      let tag = document.getElementById("export-tag");
      if (!tag) {
        tag = document.createElement("div");
        tag.id = "export-tag";
        document.body.appendChild(tag);
      }

      const grid = document.getElementById("grid");
      const visibleCards = Array.from(grid.querySelectorAll(".card")).filter(card => {
        const rect = card.getBoundingClientRect();
        return rect.top < window.innerHeight && rect.bottom > 0;
      });

      if (visibleCards.length > 0) {
        const mode = (arr) => {
          const counts = {};
          let maxCount = 0, maxItem = "—";
          arr.forEach(item => {
            if (!item) return;
            counts[item] = (counts[item] || 0) + 1;
            if (counts[item] > maxCount) {
              maxCount = counts[item]; maxItem = item;
            }
          });
          return maxItem;
        };

        let totalThick = 0, countThick = 0;
        const softnesses = [], densities = [], series = [];

        visibleCards.forEach(c => {
          const t = parseFloat(c.dataset.thickness);
          if (!isNaN(t)) { totalThick += t; countThick++; }
          if (c.dataset.softness) softnesses.push(c.dataset.softness);
          if (c.dataset.density) densities.push(c.dataset.density);
          if (c.dataset.series) series.push(c.dataset.series);
        });

        const avgThick = countThick > 0 ? (totalThick / countThick).toFixed(1) + "mm" : "—";
        const modeSoft = mode(softnesses);
        const modeDens = mode(densities);
        const modeSeri = mode(series);

        tag.innerHTML = `
          <div class="tag-header">
            <span class="tag-title">나의 장판 모음</span>
            <span class="tag-id">MIX ${Date.now().toString().slice(-6)}</span>
          </div>
          <div class="tag-body">
            <div class="tag-row"><strong>평균 두께</strong> <span>${avgThick}</span></div>
            <div class="tag-row"><strong>촉감</strong> <span>${modeSoft}</span></div>
            <div class="tag-row"><strong>밀도</strong> <span>${modeDens}</span></div>
            <div class="tag-row"><strong>메인 시리즈</strong> <span>${modeSeri}</span></div>
          </div>
        `;
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Drag Swap
    // ─────────────────────────────────────────────────────────────
    function initDragSwap(grid) {
      let dragSrc = null, clone = null;
      let startX = 0, startY = 0, cloneOffX = 0, cloneOffY = 0;

      function createClone(card) {
        const rect = card.getBoundingClientRect();
        const c = card.cloneNode(true);
        c.id = "drag-clone";
        c.style.cssText = `position:fixed; width:${rect.width}px; height:${rect.height}px; left:${rect.left}px; top:${rect.top}px; pointer-events:none; z-index:999; opacity:0.88; transform:rotate(1.5deg) scale(1.04); box-shadow:0 16px 48px rgba(0,0,0,0.6); overflow:hidden;`;
        const ov = c.querySelector(".card-overlay");
        if (ov) ov.style.opacity = "0";
        document.body.appendChild(c);
        return c;
      }

      // Proper two-node DOM swap
      function swapCards(a, b) {
        const aParent = a.parentNode;
        const bParent = b.parentNode;
        const aNext = a.nextSibling === b ? b.nextSibling : a.nextSibling;
        const bNext = b.nextSibling === a ? a.nextSibling : b.nextSibling;
        if (aParent === bParent) {
          // same parent — use a placeholder
          const placeholder = document.createComment("");
          aParent.insertBefore(placeholder, a);
          aParent.insertBefore(a, b);
          aParent.insertBefore(b, placeholder);
          aParent.removeChild(placeholder);
        }
      }

      grid.addEventListener("pointerdown", e => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        if (e.target.closest("#info-toggle") || e.target.closest("#info-panel") ||
            e.target.closest("#download-btn") || e.target.closest("#reveal-all-btn") ||
            e.target.closest("#print-btn")) return;

        const card = e.target.closest(".card");
        if (!card) return;

        startX = e.clientX; startY = e.clientY;
        const rect = card.getBoundingClientRect();
        cloneOffX = e.clientX - rect.left;
        cloneOffY = e.clientY - rect.top;

        let dragStarted = false;

        function onMove(ev) {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          if (!dragStarted && Math.sqrt(dx * dx + dy * dy) < 6) return;
          if (!dragStarted) {
            dragStarted = true;
            dragSrc = card;
            card.classList.add("card-dragging");
            clone = createClone(card);
          }
          ev.preventDefault();
          if (clone) {
            clone.style.left = (ev.clientX - cloneOffX) + "px";
            clone.style.top  = (ev.clientY - cloneOffY) + "px";
          }
          // Highlight target
          grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
          if (clone) clone.style.display = "none";
          const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest(".card");
          if (clone) clone.style.display = "";
          if (target && target !== dragSrc) target.classList.add("card-ghost");
        }

        function onUp(ev) {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup",   onUp);
          if (dragStarted) {
            grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
            if (clone) clone.style.display = "none";
            const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest(".card");
            if (clone) clone.style.display = "";
            if (target && target !== dragSrc) swapCards(dragSrc, target);
            dragSrc.classList.remove("card-dragging");
            clone?.remove(); clone = null; dragSrc = null;
          } else {
            // Simple click → reveal only this tile
            revealCard(card);
          }
        }
        window.addEventListener("pointermove", onMove, { passive: false });
        window.addEventListener("pointerup",   onUp);
      });
    }

    // ─────────────────────────────────────────────────────────────
    // Init
    // ─────────────────────────────────────────────────────────────
    async function fetchAirtable() {
      const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${encodeURIComponent(AIRTABLE_TABLE)}?pageSize=100`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
      if (!res.ok) throw new Error(`Airtable error ${res.status}`);
      const data = await res.json(); return data.records;
    }

    async function init() {
      const grid = document.getElementById("grid");
      const loading = document.getElementById("loading");

      // Info Panel logic
      const infoBtn = document.getElementById("info-toggle");
      const infoPanel = document.getElementById("info-panel");
      const infoClose = document.getElementById("info-close");

      infoBtn.onclick = (e) => {
        e.stopPropagation();
        infoPanel.classList.toggle("show");
      };
      infoClose.onclick = (e) => {
        e.stopPropagation();
        infoPanel.classList.remove("show");
      };

      // Reveal All button
      const revealAllBtn = document.getElementById("reveal-all-btn");
      if (revealAllBtn) {
        revealAllBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          revealAll();
        });
      }

      // Print button click
      const printBtn = document.getElementById("print-btn");
      if (printBtn) {
        printBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          window.print();
        });
      }

      // Download logic
      const dlBtn = document.getElementById("download-btn");
      dlBtn.addEventListener("mouseenter", () => {
        updateExportTag();
        const tag = document.getElementById("export-tag");
        if (tag) tag.classList.add("show");
      });
      dlBtn.addEventListener("mouseleave", () => {
        const tag = document.getElementById("export-tag");
        if (tag) tag.classList.remove("show");
      });

      dlBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        dlBtn.style.display = "none";
        infoBtn.style.display = "none";
        if (printBtn) printBtn.style.display = "none";

        const tag = document.getElementById("export-tag");
        if (tag) {
          tag.classList.add("show");
          tag.style.transition = "none";
        }

        try {
          const canvas = await html2canvas(document.body, {
            y: window.scrollY,
            x: 0,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: "#0a0a0a",
            useCORS: true,
            scale: 2
          });
          const link = document.createElement("a");
          link.download = `jangpan-collection-${Date.now()}.jpg`;
          link.href = canvas.toDataURL("image/jpeg", 0.95);
          link.click();
        } catch (err) {
          console.error("Screenshot failed:", err);
          alert("다운로드 중 오류가 발생했습니다.");
        }

        dlBtn.style.display = "flex";
        infoBtn.style.display = "flex";
        if (printBtn) printBtn.style.display = "flex";
        if (tag) {
          tag.classList.remove("show");
          tag.style.transition = "";
        }
      });

      try {
        const records = await fetchAirtable();
        loading.style.display = "none";

        // Sort: Prioritize high-res series (소리지움, 엑스컴포트, 시니어)
        const hiResSeries = ["소리지움", "엑스컴포트", "시니어"];
        records.sort((a, b) => {
          const aSeries = a.fields[FIELDS.series] || "";
          const bSeries = b.fields[FIELDS.series] || "";
          const aIsHiRes = hiResSeries.some(s => aSeries.includes(s));
          const bIsHiRes = hiResSeries.some(s => bSeries.includes(s));
          
          if (aIsHiRes && !bIsHiRes) return -1;
          if (!aIsHiRes && bIsHiRes) return 1;
          
          // Maintain randomness within groups
          return Math.random() - 0.5;
        });

        records.forEach((record, i) => {
          if (!record.fields[FIELDS.nameEn] && !record.fields[FIELDS.nameKo]) return;
          const card = buildCard(record, i);
          card.classList.add("sweep-in");
          grid.appendChild(card);
          card.addEventListener("animationend", (e) => {
            if (e.animationName === "sweepInAnim") card.classList.remove("sweep-in");
          });
        });

        initDragSwap(grid);
      } catch (err) {
        loading.style.display = "none";
        console.error(err);
      }
    }
    init();
  </script>
