<!DOCTYPE html>
<!--
  Based on learning from Hongik University Socio-cultural Design Studio, spring semester 2026
  Extended with: Airtable API fetch, masonry grid, hover overlay, pointer drag-to-swap
-->
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faux Flooring and Names</title>
  <meta name="description"
    content="An archive of fake wood-grain flooring units collected from Korean residential and commercial product lines." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

  <section class="works">
    <div id="grid"></div>
  </section>

  <div id="loading">loading…</div>
  <div id="error" style="display:none"></div>

  <!-- Click hint -->
  <div id="click-hint">
    <span>click anywhere to reveal all</span>
  </div>

  <!-- Info Toggle & Panel -->
  <button id="info-toggle">info</button>
  <div id="info-panel">
    <button id="info-close" aria-label="Close panel">&times;</button>
    <div class="tag-header">
      <span class="tag-title">ABOUT ARCHIVE</span>
      <span class="tag-id">INFORMATION</span>
    </div>
    <div class="tag-body">
      <div class="tag-row">
        <p>This archive explores the aesthetic gap between the luxury names given to commercial flooring and their
          synthetic reality.</p>
      </div>
      <div class="tag-row">
        <strong>Credits</strong>
        <span>
          Flooring Data: LX Hausys, KCC.<br>
          Images: <a href="https://commons.wikimedia.org/" target="_blank">Wikimedia Commons</a>
        </span>
      </div>
      <div class="tag-row">
        <strong>Usage</strong>
        <span>Click tiles to reveal. Drag to reorder.</span>
      </div>
    </div>
  </div>

  <!-- Download button -->
  <button id="download-btn" title="Download My View" aria-label="Download Viewport">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
      stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="7 10 12 15 17 10" />
      <line x1="12" y1="15" x2="12" x2="3" />
    </svg>
  </button>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Config
    // ─────────────────────────────────────────────────────────────
    const AIRTABLE_TOKEN = "patMrJnngETB8Srn9.2291fafcbf0c5009f6cd1bb0fb76f64a4186e03dc379d4ef282b70acd6ed3dea";
    const AIRTABLE_BASE = "app0gYEl62r82qDqK";
    const AIRTABLE_TABLE = "css용 시트";

    const FIELDS = {
      nameKo: "장판 이름 (한글)",
      nameEn: "장판 이름 (영어)",
      image: "사진",
      unitSize: "나무판 무늬 유닛 1개 크기",
      maxRepeat: "똑같은 디자인이 반복되지 않는 최대 크기",
      density: "단위무늬당 유닛 밀도",
      pattern: "제조사에서 말하는 무늬 특징",
      thickness: "두께",
      softness: "푹신함? 단단함?",
      purpose: "장판의 목적",
      series: "장판 시리즈 이름",
      brand: "출시 회사",
    };

    let isGlobalRevealed = false;

    // ─────────────────────────────────────────────────────────────
    // Fetch multiple images from Wikimedia Commons
    // ─────────────────────────────────────────────────────────────
    async function fetchWikiImages(query, limit = 3) {
      if (!query) return [];
      const safeQuery = query + ' -nazi -communism -soviet -ussr -insect -bug -spider -moth -portrait -biography -actor -singer -politician -nude -anatomy -sexual -organ -medical -disease -blood -surgery -flesh -tissue -muscle -person -human -man -woman -author -writer -artist -born -died -death -incategory:"Living people"';
      const url = `https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(safeQuery)}&gsrlimit=12&prop=pageimages&format=json&piprop=thumbnail|original&pithumbsize=600&origin=*`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.query?.pages) {
          const validPages = Object.values(data.query.pages)
            .filter(p => p.thumbnail?.source || p.original?.source);

          if (validPages.length > 0) {
            // Prioritize GIFs if available
            const gifs = validPages.filter(p => p.original?.source?.toLowerCase().endsWith('.gif'));
            const others = validPages.filter(p => !p.original?.source?.toLowerCase().endsWith('.gif'));

            // Shuffle both
            gifs.sort(() => Math.random() - 0.5);
            others.sort(() => Math.random() - 0.5);

            // Combine with GIFs first
            const combined = [...gifs, ...others];

            return combined.slice(0, limit).map(p => {
              // If it's a gif, use original source for animation
              if (p.original?.source?.toLowerCase().endsWith('.gif')) return p.original.source;
              return p.thumbnail?.source || p.original?.source;
            });
          }
        }
      } catch (err) { console.error("Wiki API error:", err); }
      return [];
    }

    // ─────────────────────────────────────────────────────────────
    // Build a single card element
    // ─────────────────────────────────────────────────────────────
    function buildCard(record, index) {
      const f = record.fields;
      const name = f[FIELDS.nameEn] || f[FIELDS.nameKo] || "—";

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = record.id;

      card.dataset.density = f[FIELDS.density] || "";
      card.dataset.thickness = f[FIELDS.thickness] || "";
      card.dataset.softness = f[FIELDS.softness] || "";
      card.dataset.series = f[FIELDS.series] || "";

      const imgWrap = document.createElement("div");
      imgWrap.className = "card-img-wrap";

      const imageAttachments = f[FIELDS.image];
      let aspectRatio = 1.0;

      if (imageAttachments && imageAttachments.length > 0) {
        const att = imageAttachments[0];
        if (att.width && att.height) {
          aspectRatio = att.width / att.height;
          imgWrap.style.aspectRatio = `${att.width} / ${att.height}`;
        } else {
          imgWrap.style.minHeight = "240px";
        }
      } else {
        const ratios = ["4/5", "3/4", "5/6", "1/1"];
        imgWrap.style.aspectRatio = ratios[index % ratios.length];
        aspectRatio = 0.8;
      }

      // 1. Wood Image Layer (Bottom - STABLE)
      const woodImg = document.createElement("img");
      woodImg.className = "card-wood-img";
      if (imageAttachments && imageAttachments.length > 0) {
        woodImg.src = imageAttachments[0].url;
        woodImg.crossOrigin = "anonymous";
        woodImg.alt = name;
        woodImg.loading = "lazy";
        woodImg.draggable = false;
        imgWrap.appendChild(woodImg);
      } else {
        const hue = Math.floor(Math.random() * 360);
        woodImg.style.display = "none";
        imgWrap.style.backgroundColor = `hsl(${hue}, 20%, 15%)`;
        const label = document.createElement("span");
        label.className = "placeholder-label";
        label.textContent = "—";
        imgWrap.appendChild(label);
      }

      // 2. Concept Image Layer (Top - SWEEPABLE)
      const textLayer = document.createElement("div");
      textLayer.className = "card-text-layer";
      imgWrap.appendChild(textLayer);

      // Determine how many images to stack based on aspect ratio
      // USER REQUEST: allow up to 8 wiki images in a single narrow tile
      let stackCount = 1;
      if (aspectRatio < 0.2) stackCount = 8;
      else if (aspectRatio < 0.3) stackCount = 6;
      else if (aspectRatio < 0.45) stackCount = 4;
      else if (aspectRatio < 0.65) stackCount = 2;

      const searchName = f[FIELDS.nameEn] || f[FIELDS.nameKo];
      if (searchName) {
        fetchWikiImages(searchName, stackCount).then(urls => {
          if (urls.length > 0) {
            urls.forEach(url => {
              const cImg = document.createElement("img");
              cImg.src = url;
              cImg.style.cssText = `width:100%; height:${100 / urls.length}%; object-fit:cover; display:block;`;
              cImg.draggable = false;
              textLayer.appendChild(cImg);
            });
          } else {
            const hue = Math.floor(Math.random() * 360);
            textLayer.style.backgroundColor = `hsl(${hue}, 40%, 40%)`;
          }
        });
      }

      // 3. Hover Overlay (Only visible in revealed state)
      const rows = [
        { label: "한국어명", value: f[FIELDS.nameKo] },
        { label: "시리즈", value: f[FIELDS.series] },
        { label: "용도", value: f[FIELDS.purpose] },
        { label: "유닛 크기", value: f[FIELDS.unitSize] },
        { label: "반복 최대", value: f[FIELDS.maxRepeat] },
        { label: "밀도", value: f[FIELDS.density] },
        { label: "두께", value: f[FIELDS.thickness] },
        { label: "푹신함", value: f[FIELDS.softness] },
        { label: "무늬 특징", value: f[FIELDS.pattern] },
      ].filter(r => r.value);

      const overlay = document.createElement("div");
      overlay.className = "card-overlay";
      overlay.innerHTML = `
        <p class="overlay-title">${name}</p>
        ${f[FIELDS.brand] ? `<p class="overlay-brand">${f[FIELDS.brand]}</p>` : ""}
        ${rows.length > 0 ? `<dl>${rows.map(r => `<dt>${r.label}</dt><dd>${r.value}</dd>`).join("")}</dl>` : ""}
      `;
      imgWrap.appendChild(overlay);

      card.appendChild(imgWrap);
      return card;
    }

    // ─────────────────────────────────────────────────────────────
    // Toggle Reveal (Wave effect or All-at-once)
    // ─────────────────────────────────────────────────────────────
    function toggleGlobalReveal() {
      isGlobalRevealed = !isGlobalRevealed;
      const cards = Array.from(document.querySelectorAll(".card"));

      cards.forEach((card, i) => {
        setTimeout(() => {
          if (isGlobalRevealed) {
            card.classList.add("is-revealed");
            // Add stable class after the 0.7s sweep transition finishes
            setTimeout(() => card.classList.add("is-stable"), 700);
          } else {
            card.classList.remove("is-revealed", "is-stable");
          }
        }, i * 12);
      });

      const hint = document.getElementById("click-hint");
      if (hint) {
        if (isGlobalRevealed) hint.classList.add("hidden");
        else hint.classList.remove("hidden");
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Export Tag / Download Logic
    // ─────────────────────────────────────────────────────────────
    function updateExportTag() {
      let tag = document.getElementById("export-tag");
      if (!tag) {
        tag = document.createElement("div");
        tag.id = "export-tag";
        document.body.appendChild(tag);
      }

      const grid = document.getElementById("grid");
      const visibleCards = Array.from(grid.querySelectorAll(".card")).filter(card => {
        const rect = card.getBoundingClientRect();
        return rect.top < window.innerHeight && rect.bottom > 0;
      });

      if (visibleCards.length > 0) {
        const mode = (arr) => {
          const counts = {};
          let maxCount = 0, maxItem = "—";
          arr.forEach(item => {
            if (!item) return;
            counts[item] = (counts[item] || 0) + 1;
            if (counts[item] > maxCount) {
              maxCount = counts[item]; maxItem = item;
            }
          });
          return maxItem;
        };

        let totalThick = 0, countThick = 0;
        const softnesses = [], densities = [], series = [];

        visibleCards.forEach(c => {
          const t = parseFloat(c.dataset.thickness);
          if (!isNaN(t)) { totalThick += t; countThick++; }
          if (c.dataset.softness) softnesses.push(c.dataset.softness);
          if (c.dataset.density) densities.push(c.dataset.density);
          if (c.dataset.series) series.push(c.dataset.series);
        });

        const avgThick = countThick > 0 ? (totalThick / countThick).toFixed(1) + "mm" : "—";
        const modeSoft = mode(softnesses);
        const modeDens = mode(densities);
        const modeSeri = mode(series);

        tag.innerHTML = `
          <div class="tag-header">
            <span class="tag-title">나의 장판 모음</span>
            <span class="tag-id">MIX ${Date.now().toString().slice(-6)}</span>
          </div>
          <div class="tag-body">
            <div class="tag-row"><strong>평균 두께</strong> <span>${avgThick}</span></div>
            <div class="tag-row"><strong>푹신함</strong> <span>${modeSoft}</span></div>
            <div class="tag-row"><strong>밀도</strong> <span>${modeDens}</span></div>
            <div class="tag-row"><strong>메인 시리즈</strong> <span>${modeSeri}</span></div>
          </div>
        `;
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Drag Swap
    // ─────────────────────────────────────────────────────────────
    function initDragSwap(grid) {
      let dragSrc = null; let clone = null;
      let startX = 0, startY = 0; let cloneOffX = 0, cloneOffY = 0;

      function createClone(card) {
        const rect = card.getBoundingClientRect();
        const c = card.cloneNode(true);
        c.id = "drag-clone";
        c.style.cssText = `width:${rect.width}px; height:${rect.height}px; left:${rect.left}px; top:${rect.top}px;`;
        const ov = c.querySelector(".card-overlay");
        if (ov) ov.style.opacity = "0";
        document.body.appendChild(c);
        return c;
      }

      grid.addEventListener("pointerdown", e => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        if (e.target.closest("#info-toggle") || e.target.closest("#info-panel") || e.target.closest("#download-btn")) return;

        const card = e.target.closest(".card");
        if (!card) return;

        startX = e.clientX; startY = e.clientY;
        const rect = card.getBoundingClientRect();
        cloneOffX = e.clientX - rect.left; cloneOffY = e.clientY - rect.top;

        let dragStarted = false;
        function onMove(ev) {
          const dx = ev.clientX - startX; const dy = ev.clientY - startY;
          if (!dragStarted && Math.sqrt(dx * dx + dy * dy) < 6) return;
          if (!dragStarted) {
            dragStarted = true; dragSrc = card;
            card.classList.add("card-dragging"); clone = createClone(card);
          }
          ev.preventDefault();
          if (clone) {
            clone.style.left = (ev.clientX - cloneOffX) + "px";
            clone.style.top = (ev.clientY - cloneOffY) + "px";
          }
        }

        function onUp(ev) {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          if (dragStarted) {
            const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest(".card");
            if (target && target !== dragSrc) {
              const p = dragSrc.parentNode;
              const nextTarget = target.nextSibling === dragSrc ? target : target.nextSibling;
              p.insertBefore(dragSrc, nextTarget);
            }
            dragSrc.classList.remove("card-dragging");
            clone?.remove(); clone = null; dragSrc = null;
          } else {
            // Click any tile triggers Global Reveal
            toggleGlobalReveal();
          }
        }
        window.addEventListener("pointermove", onMove, { passive: false });
        window.addEventListener("pointerup", onUp);
      });

      document.body.addEventListener("click", (e) => {
        if (!e.target.closest(".card") && !e.target.closest("#download-btn") && !e.target.closest("#info-toggle") && !e.target.closest("#info-panel")) {
          toggleGlobalReveal();
        }
      });
    }

    // ─────────────────────────────────────────────────────────────
    // Init
    // ─────────────────────────────────────────────────────────────
    async function fetchAirtable() {
      const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${encodeURIComponent(AIRTABLE_TABLE)}?pageSize=100`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
      if (!res.ok) throw new Error(`Airtable error ${res.status}`);
      const data = await res.json(); return data.records;
    }

    async function init() {
      const grid = document.getElementById("grid");
      const loading = document.getElementById("loading");

      // Info Panel logic
      const infoBtn = document.getElementById("info-toggle");
      const infoPanel = document.getElementById("info-panel");
      const infoClose = document.getElementById("info-close");

      infoBtn.onclick = (e) => {
        e.stopPropagation();
        infoPanel.classList.toggle("show");
      };
      infoClose.onclick = (e) => {
        e.stopPropagation();
        infoPanel.classList.remove("show");
      };

      // Download logic
      const dlBtn = document.getElementById("download-btn");
      dlBtn.addEventListener("mouseenter", () => {
        updateExportTag();
        const tag = document.getElementById("export-tag");
        if (tag) tag.classList.add("show");
      });
      dlBtn.addEventListener("mouseleave", () => {
        const tag = document.getElementById("export-tag");
        if (tag) tag.classList.remove("show");
      });

      dlBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        dlBtn.style.display = "none";
        infoBtn.style.display = "none";

        const tag = document.getElementById("export-tag");
        if (tag) {
          tag.classList.add("show");
          tag.style.transition = "none";
        }

        try {
          const canvas = await html2canvas(document.body, {
            y: window.scrollY,
            x: 0,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: "#0a0a0a",
            useCORS: true,
            scale: 2
          });
          const link = document.createElement("a");
          link.download = `jangpan-collection-${Date.now()}.jpg`;
          link.href = canvas.toDataURL("image/jpeg", 0.95);
          link.click();
        } catch (err) {
          console.error("Screenshot failed:", err);
          alert("다운로드 중 오류가 발생했습니다.");
        }

        dlBtn.style.display = "flex";
        infoBtn.style.display = "flex";
        if (tag) {
          tag.classList.remove("show");
          tag.style.transition = "";
        }
      });

      try {
        const records = await fetchAirtable();
        loading.style.display = "none";

        records.forEach((record, i) => {
          if (!record.fields[FIELDS.nameEn] && !record.fields[FIELDS.nameKo]) return;
          const card = buildCard(record, i);
          card.classList.add("sweep-in");
          grid.appendChild(card);
          card.addEventListener("animationend", (e) => {
            if (e.animationName === "sweepInAnim") card.classList.remove("sweep-in");
          });
        });

        initDragSwap(grid);
      } catch (err) {
        loading.style.display = "none";
        console.error(err);
      }
    }
    init();
  </script>
</body>

</html>
