  <!-- Hidden SVG for Filters -->
  <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" aria-hidden="true">
    <defs>
      <filter id="ink-bleed" x="-20%" y="-20%" width="140%" height="140%">
        <!-- Duplicate source graphic (the dotted text) and blur it to form the base bleed -->
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur" />

        <!-- Generate high-frequency noise for ink fiber bleed effect -->
        <feTurbulence type="fractalNoise" baseFrequency="0.25" numOctaves="3" result="noise" />

        <!-- Displace the blur to make it rough and fuzzy like bleeding ink -->
        <feDisplacementMap in="blur" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"
          result="displaced" />

        <!-- Color the displaced bleed to matching ink color rgb(43, 50, 28) -->
        <feColorMatrix type="matrix" values="0 0 0 0 0.168
                                             0 0 0 0 0.196
                                             0 0 0 0 0.110
                                             0 0 0 0.70 0" in="displaced" result="bleed" />

        <!-- Merge the original unwarped SourceGraphic on top of the bleed shadow -->
        <feMerge>
          <feMergeNode in="bleed" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>
  </svg>

  <script>
    // ─────────────────────────────────────────────────────────────
    // Print: populate floor mosaic before printing, clean up after
    // ─────────────────────────────────────────────────────────────
    (function () {

      // ── Step 1: collect visible wood-tile images from the current viewport ──
      function getVisibleTileSrcs() {
        const grid = document.getElementById('grid');
        if (!grid) return [];
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        return Array.from(grid.querySelectorAll('.card'))
          .filter(card => {
            const r = card.getBoundingClientRect();
            return r.top < vh && r.bottom > 0 && r.left < vw && r.right > 0;
          })
          .map(card => {
            const img  = card.querySelector('.card-wood-img');
            if (!img) return null;
            const src = img.getAttribute('src');
            if (!src || src.trim() === '') return null;
            // Capture the tile's natural aspect ratio (height/width) so planks
            // stay tall & narrow like real flooring, not square
            const r = card.getBoundingClientRect();
            const ar = r.width > 0 ? r.height / r.width : 2.5; // height:width ratio
            return { src: src, alt: img.alt || '', ar };
          })
          .filter(Boolean);
      }

      // ── Step 2: build the flooring mosaic in the print zone ─────────────────
      // Layout: narrow vertical plank columns with staggered start offsets.
      function buildFloorGrid(tiles) {
        const zone   = document.getElementById('print-floor-zone');
        const gridEl = document.getElementById('print-floor-grid');
        if (!zone || !gridEl) return;
        gridEl.innerHTML = '';
        if (tiles.length === 0) return;

        // Get actual columns count on screen dynamically and double it
        const grid = document.getElementById('grid');
        const numCols = grid ? (parseInt(window.getComputedStyle(grid).columnCount) || 8) : 8;
        const NUM_COLS = numCols * 2;
        const ZONE_H_MM = 105;
        const colW_mm = 105 / NUM_COLS;

        let totalAR = 0;
        tiles.forEach(t => { totalAR += t.ar || 2.5; });
        const avgAR = tiles.length > 0 ? (totalAR / tiles.length) : 2.5;
        const arFactor = Math.max(avgAR * 2.8, 8.0);
        const plankH_mm = colW_mm * arFactor;

        gridEl.style.cssText = 'position:relative; width:100%; height:100%; overflow:hidden;';

        const STAIR_STEP = 0.25;
        const maxStagger_mm = 0.75 * plankH_mm;
        const planksNeeded = Math.ceil((ZONE_H_MM + maxStagger_mm) / plankH_mm) + 2;

        const selectedGrid = [];
        for (let col = 0; col < NUM_COLS; col++) { selectedGrid[col] = []; }

        const totalCells = NUM_COLS * planksNeeded;
        const pool = [];
        for (let i = 0; i < totalCells; i++) { pool.push(i % tiles.length); }

        function seededRandomGenerator(seed) {
          let s = seed;
          return function() {
            s = (s * 9301 + 49297) % 233280;
            return s / 233280;
          };
        }
        const rand = seededRandomGenerator(12345);
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          const temp = pool[i];
          pool[i] = pool[j];
          pool[j] = temp;
        }

        let poolIdx = 0;
        for (let row = 0; row < planksNeeded; row++) {
          for (let col = 0; col < NUM_COLS; col++) {
            let chosenIdx = -1;
            if (tiles.length > 1) {
              for (let i = poolIdx; i < pool.length; i++) {
                const t = pool[i];
                const isVerticalRepeat   = row > 0 && selectedGrid[col][row - 1] === t;
                const isHorizontalRepeat = col > 0 && selectedGrid[col - 1][row] === t;
                const isDiagLeft         = col > 0 && row > 0 && selectedGrid[col - 1][row - 1] === t;
                const isDiagRight        = col < NUM_COLS - 1 && row > 0 && selectedGrid[col + 1][row - 1] === t;

                if (!isVerticalRepeat && !isHorizontalRepeat && !isDiagLeft && !isDiagRight) {
                  chosenIdx = i; break;
                }
              }
              if (chosenIdx === -1) {
                for (let i = poolIdx; i < pool.length; i++) {
                  const t = pool[i];
                  const isVerticalRepeat   = row > 0 && selectedGrid[col][row - 1] === t;
                  const isHorizontalRepeat = col > 0 && selectedGrid[col - 1][row] === t;
                  if (!isVerticalRepeat && !isHorizontalRepeat) { chosenIdx = i; break; }
                }
              }
              if (chosenIdx === -1) {
                for (let i = poolIdx; i < pool.length; i++) {
                  if (row === 0 || selectedGrid[col][row - 1] !== pool[i]) { chosenIdx = i; break; }
                }
              }
              if (chosenIdx === -1) chosenIdx = poolIdx;
              const temp = pool[poolIdx]; pool[poolIdx] = pool[chosenIdx]; pool[chosenIdx] = temp;
              selectedGrid[col][row] = pool[poolIdx];
            } else { selectedGrid[col][row] = 0; }
            poolIdx++;
          }
        }

        for (let col = 0; col < NUM_COLS; col++) {
          const colLeft_mm = col * colW_mm;
          const topOffset_mm = -((col * STAIR_STEP) % 1) * plankH_mm;
          const totalColH_mm = plankH_mm * planksNeeded;
          const colEl = document.createElement('div');
          colEl.style.cssText = [
            'position:absolute', `left:${colLeft_mm.toFixed(3)}mm`, `width:${colW_mm.toFixed(3)}mm`,
            `top:${topOffset_mm.toFixed(3)}mm`, `height:${totalColH_mm.toFixed(3)}mm`,
            'display:flex', 'flex-direction:column', 'align-items:stretch', 'overflow:visible'
          ].join(';');

          for (let i = 0; i < planksNeeded; i++) {
            const tile = tiles[selectedGrid[col][i]];
            const plank = document.createElement('div');
            plank.style.cssText = `flex-shrink:0; width:100%; height:${plankH_mm.toFixed(3)}mm; overflow:hidden;`;
            const img = document.createElement('img');
            img.src         = tile.src;
            img.alt         = tile.alt || '';
            img.style.cssText = 'display:block; width:100%; height:100%; object-fit:cover; object-position:center;';
            plank.appendChild(img);
            colEl.appendChild(plank);
          }
          gridEl.appendChild(colEl);
        }
      }

      window.addEventListener('beforeprint', () => {
        const tiles = getVisibleTileSrcs();
        buildFloorGrid(tiles);
      });

      window.addEventListener('afterprint', () => {
        const gridEl = document.getElementById('print-floor-grid');
        if (gridEl) { gridEl.innerHTML = ''; gridEl.removeAttribute('style'); }
      });

      function buildMiniFloorGrid(tiles) {
        const gridEl = document.getElementById('mini-floor-grid');
        if (!gridEl) return;
        gridEl.innerHTML = '';
        if (tiles.length === 0) return;
        const NUM_COLS = 8;
        const STAIR_STEP = 0.25;
        let totalAR = 0;
        tiles.forEach(t => { totalAR += t.ar || 2.5; });
        const avgAR = tiles.length > 0 ? (totalAR / tiles.length) : 2.5;
        const arFactor = Math.max(avgAR * 2.8, 8.0);
        const colW_pct = 100 / NUM_COLS;
        const containerWidth = gridEl.getBoundingClientRect().width || 77.5;
        const colWidth_px = containerWidth / NUM_COLS;
        const plankH_px = colWidth_px * arFactor;
        const planksNeeded = Math.ceil((gridEl.getBoundingClientRect().height || 77.5) / plankH_px) + 2;
        gridEl.style.cssText = 'position:relative; width:100%; height:100%; overflow:hidden;';
        const selectedGrid = [];
        for (let col = 0; col < NUM_COLS; col++) { selectedGrid[col] = []; }
        const totalCells = NUM_COLS * planksNeeded;
        const pool = [];
        for (let i = 0; i < totalCells; i++) { pool.push(i % tiles.length); }
        function seededRandomGenerator(seed) {
          let s = seed;
          return function() { s = (s * 9301 + 49297) % 233280; return s / 233280; };
        }
        const rand = seededRandomGenerator(12345);
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          const temp = pool[i]; pool[i] = pool[j]; pool[j] = temp;
        }
        let poolIdx = 0;
        for (let row = 0; row < planksNeeded; row++) {
          for (let col = 0; col < NUM_COLS; col++) {
            let chosenIdx = -1;
            if (tiles.length > 1) {
              for (let i = poolIdx; i < pool.length; i++) {
                const t = pool[i];
                const isVerticalRepeat = row > 0 && selectedGrid[col][row - 1] === t;
                const isHorizontalRepeat = col > 0 && selectedGrid[col - 1][row] === t;
                const isDiagLeft = col > 0 && row > 0 && selectedGrid[col - 1][row - 1] === t;
                const isDiagRight = col < NUM_COLS - 1 && row > 0 && selectedGrid[col + 1][row - 1] === t;
                if (!isVerticalRepeat && !isHorizontalRepeat && !isDiagLeft && !isDiagRight) { chosenIdx = i; break; }
              }
              if (chosenIdx === -1) {
                for (let i = poolIdx; i < pool.length; i++) {
                  const t = pool[i];
                  const isVerticalRepeat = row > 0 && selectedGrid[col][row - 1] === t;
                  const isHorizontalRepeat = col > 0 && selectedGrid[col - 1][row] === t;
                  if (!isVerticalRepeat && !isHorizontalRepeat) { chosenIdx = i; break; }
                }
              }
              if (chosenIdx === -1) {
                for (let i = poolIdx; i < pool.length; i++) {
                  if (row === 0 || selectedGrid[col][row - 1] !== pool[i]) { chosenIdx = i; break; }
                }
              }
              if (chosenIdx === -1) chosenIdx = poolIdx;
              const temp = pool[poolIdx]; pool[poolIdx] = pool[chosenIdx]; pool[chosenIdx] = temp;
              selectedGrid[col][row] = pool[poolIdx];
            } else { selectedGrid[col][row] = 0; }
            poolIdx++;
          }
        }
        for (let col = 0; col < NUM_COLS; col++) {
          const colLeft_pct = col * colW_pct;
          const topOffset_px = -((col * STAIR_STEP) % 1) * plankH_px;
          const totalColH_px = plankH_px * planksNeeded;
          const colEl = document.createElement('div');
          colEl.style.cssText = [
            'position:absolute', `left:${colLeft_pct.toFixed(3)}%`, `width:${colW_pct.toFixed(3)}%`,
            `top:${topOffset_px.toFixed(3)}px`, `height:${totalColH_px.toFixed(3)}px`,
            'display:flex', 'flex-direction:column', 'align-items:stretch', 'overflow:visible'
          ].join(';');
          for (let i = 0; i < planksNeeded; i++) {
            const tile = tiles[selectedGrid[col][i]];
            const plank = document.createElement('div');
            plank.style.cssText = `flex-shrink:0; width:100%; height:${plankH_px.toFixed(3)}px; overflow:hidden;`;
            const img = document.createElement('img');
            img.src = tile.src; img.alt = tile.alt || '';

    // ─────────────────────────────────────────────────────────────
    // Fetch multiple images from Wikimedia Commons
    // ─────────────────────────────────────────────────────────────
    async function fetchWikiImages(query, limit = 3) {
      if (!query) return [];
      const safeQuery = query + ' -nazi -communism -soviet -ussr -insect -bug -spider -moth -portrait -biography -actor -singer -politician -nude -anatomy -sexual -organ -medical -disease -blood -surgery -flesh -tissue -muscle -person -human -man -woman -author -writer -artist -born -died -death -incategory:"Living people"';
      const url = `https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(safeQuery)}&gsrlimit=12&prop=pageimages&format=json&piprop=thumbnail|original&pithumbsize=600&origin=*`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.query?.pages) {
          const validPages = Object.values(data.query.pages)
            .filter(p => p.thumbnail?.source || p.original?.source);

          if (validPages.length > 0) {
            // Prioritize GIFs if available
            const gifs = validPages.filter(p => p.original?.source?.toLowerCase().endsWith('.gif'));
            const others = validPages.filter(p => !p.original?.source?.toLowerCase().endsWith('.gif'));

            // Shuffle both
            gifs.sort(() => Math.random() - 0.5);
            others.sort(() => Math.random() - 0.5);

            // Combine with GIFs first
            const combined = [...gifs, ...others];

            return combined.slice(0, limit).map(p => {
              // If it's a gif, use original source for animation
              if (p.original?.source?.toLowerCase().endsWith('.gif')) return p.original.source;
              return p.thumbnail?.source || p.original?.source;
            });
          }
        }
      } catch (err) { console.error("Wiki API error:", err); }
      return [];
    }

      const restWords = words.slice(1).join(" ");
      return `<span class="title-cursive">${firstWord} </span><span class="title-straight">${restWords}</span>`;

    // ─────────────────────────────────────────────────────────────
    // Build a single card element
    // ─────────────────────────────────────────────────────────────
    function buildCard(record, index) {
      const f = record.fields;
      const name = f[FIELDS.nameEn] || f[FIELDS.nameKo] || "—";

      const rawBrand = f[FIELDS.brand] || "";
      const brand = TRANSLATIONS.en.brand[rawBrand] || rawBrand;

      const rawSeries = f[FIELDS.series] || "";
      const series = TRANSLATIONS.en.series[rawSeries] || rawSeries;

      const rawSoftness = f[FIELDS.softness] || "";
      const softness = TRANSLATIONS.en.softness[rawSoftness] || rawSoftness;

      const rawPurpose = f[FIELDS.purpose] || "";
      const purpose = TRANSLATIONS.en.purpose[rawPurpose] || rawPurpose;

      const thickness = f[FIELDS.thickness] || "—";

      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = record.id;
      card.record = record; // Save reference for overlay regeneration

      // Dataset values in English for export tag calculation
      card.dataset.thickness = thickness;
      card.dataset.softness = softness;
      card.dataset.series = series;
      card.dataset.brand = brand;
      card.dataset.purpose = purpose;

      const imgWrap = document.createElement("div");
      imgWrap.className = "card-img-wrap";

      const imageAttachments = f[FIELDS.image];
      let aspectRatio = 1.0;

      if (imageAttachments && imageAttachments.length > 0) {
        const att = imageAttachments[0];
        if (att.width && att.height) {
          aspectRatio = att.width / att.height;
          imgWrap.style.aspectRatio = `${att.width} / ${att.height}`;
        } else {
          imgWrap.style.minHeight = "240px";
        }
      } else {
        const ratios = ["4/5", "3/4", "5/6", "1/1"];
        imgWrap.style.aspectRatio = ratios[index % ratios.length];
        aspectRatio = 0.8;
      }

      // 1. Wood Image Layer (Bottom - STABLE)
      const woodImg = document.createElement("img");
      woodImg.className = "card-wood-img";
      if (imageAttachments && imageAttachments.length > 0) {
        woodImg.src = imageAttachments[0].url;
        woodImg.crossOrigin = "anonymous";
        woodImg.alt = name;
        woodImg.loading = "lazy";
        woodImg.draggable = false;
        imgWrap.appendChild(woodImg);
      } else {
        const hue = Math.floor(Math.random() * 360);
        woodImg.style.display = "none";
        imgWrap.style.backgroundColor = `hsl(${hue}, 20%, 15%)`;
        const label = document.createElement("span");
        label.className = "placeholder-label";
        label.textContent = "—";
        imgWrap.appendChild(label);
      }

      // 2. Concept Image Layer (Top - SWEEPABLE)
      const textLayer = document.createElement("div");
      textLayer.className = "card-text-layer";
      imgWrap.appendChild(textLayer);

      // Determine how many images to stack based on aspect ratio
      let stackCount = 1;
      if (aspectRatio < 0.15) stackCount = 8;
      else if (aspectRatio < 0.22) stackCount = 6;
      else if (aspectRatio < 0.35) stackCount = 4;
      else if (aspectRatio < 0.55) stackCount = 2;

      const searchName = f[FIELDS.nameEn] || f[FIELDS.nameKo];
      if (searchName) {
        fetchWikiImages(searchName, stackCount).then(urls => {
          if (urls.length > 0) {
            urls.forEach(url => {
              const cImg = document.createElement("img");
              cImg.src = url;
              cImg.style.cssText = `width:100%; height:${100 / urls.length}%; object-fit:cover; display:block;`;
              cImg.draggable = false;
              textLayer.appendChild(cImg);
            });
          } else {
            const hue = Math.floor(Math.random() * 360);
            textLayer.style.backgroundColor = `hsl(${hue}, 40%, 40%)`;
          }
        });
      }

      // 3. Hover Overlay (Only visible in revealed state)
      // Styled exactly according to Figma specification node 1:363
      const overlay = document.createElement("div");
      overlay.className = "card-overlay";
      overlay.innerHTML = getOverlayHTML(record);
      imgWrap.appendChild(overlay);

      card.appendChild(imgWrap);
      return card;
    }

    // ─────────────────────────────────────────────────────────────
    // Export Tag / Download Logic
    // ─────────────────────────────────────────────────────────────
    function updateExportTag() {
      let tag = document.getElementById("export-tag");
      if (!tag) {
        tag = document.createElement("div");
        tag.id = "export-tag";
        document.body.appendChild(tag);
      }

      const grid = document.getElementById("grid");
      const visibleCards = Array.from(grid.querySelectorAll(".card")).filter(card => {
        const rect = card.getBoundingClientRect();
        return rect.top < window.innerHeight && rect.bottom > 0;
      });

      if (visibleCards.length > 0) {
        const mode = (arr) => {
          const counts = {};
          let maxCount = 0, maxItem = "—";
          arr.forEach(item => {
            if (!item) return;
            counts[item] = (counts[item] || 0) + 1;
            if (counts[item] > maxCount) {
              maxCount = counts[item]; maxItem = item;
            }
          });
          return maxItem;
        };

        let totalThick = 0, countThick = 0;
        const softnesses = [], series = [];

        visibleCards.forEach(c => {
          const t = parseFloat(c.dataset.thickness);
          if (!isNaN(t)) { totalThick += t; countThick++; }
          if (c.dataset.softness) softnesses.push(c.dataset.softness);
          if (c.dataset.series) series.push(c.dataset.series);
        });

        const avgThick = countThick > 0 ? (totalThick / countThick).toFixed(1) + "mm" : "—";
        const rawSoft = mode(softnesses);
        const rawSeri = mode(series);

        const keySoft = Object.keys(TRANSLATIONS.en.softness).find(k => TRANSLATIONS.en.softness[k] === rawSoft) || rawSoft;
        const modeSoft = TRANSLATIONS[activeLang].softness[keySoft] || keySoft;

        const keySeri = Object.keys(TRANSLATIONS.en.series).find(k => TRANSLATIONS.en.series[k] === rawSeri) || rawSeri;
        const modeSeri = TRANSLATIONS[activeLang].series[keySeri] || keySeri;

        const t = TRANSLATIONS[activeLang].exportTag;

        tag.innerHTML = `
          <div class="tag-header">
            <span class="tag-title">${t.title.toUpperCase()}</span>
            <span class="tag-id">MIX ${Date.now().toString().slice(-6)}</span>
          </div>
          <div class="tag-body">
            <div class="tag-row"><strong>${t.avgThickness}</strong> <span>${avgThick}</span></div>
            <div class="tag-row"><strong>${t.softness}</strong> <span>${modeSoft}</span></div>
            <div class="tag-row"><strong>${t.mainSeries}</strong> <span>${modeSeri}</span></div>
          </div>
        `;
      }
    }

    // ─────────────────────────────────────────────────────────────
    // Drag Swap
    // ─────────────────────────────────────────────────────────────
    function initDragSwap(grid) {
      let dragSrc = null, clone = null;
      let startX = 0, startY = 0, cloneOffX = 0, cloneOffY = 0;

      function createClone(card) {
        const rect = card.getBoundingClientRect();
        const c = card.cloneNode(true);
        c.id = "drag-clone";
        c.style.cssText = `position:fixed; width:${rect.width}px; height:${rect.height}px; left:${rect.left}px; top:${rect.top}px; pointer-events:none; z-index:999; opacity:0.88; transform:rotate(1.5deg) scale(1.04); box-shadow:0 16px 48px rgba(0,0,0,0.6); overflow:hidden;`;
        const ov = c.querySelector(".card-overlay");
        if (ov) ov.style.opacity = "0";
        document.body.appendChild(c);
        return c;
      }

      // Proper two-node DOM swap
      function swapCards(a, b) {
        const aParent = a.parentNode;
        const bParent = b.parentNode;
        const aNext = a.nextSibling === b ? b.nextSibling : a.nextSibling;
        const bNext = b.nextSibling === a ? a.nextSibling : b.nextSibling;
        if (aParent === bParent) {
          // same parent — use a placeholder
          const placeholder = document.createComment("");
          aParent.insertBefore(placeholder, a);
          aParent.insertBefore(a, b);
          aParent.insertBefore(b, placeholder);
          aParent.removeChild(placeholder);
        }
      }

      grid.addEventListener("pointerdown", e => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        if (e.target.closest("#info-toggle") || e.target.closest("#info-panel") ||
          e.target.closest("#print-menu") || e.target.closest("#reveal-all-btn") ||
          e.target.closest("#print-btn")) return;

        const card = e.target.closest(".card");
        if (!card) return;

        startX = e.clientX; startY = e.clientY;
        const rect = card.getBoundingClientRect();
        cloneOffX = e.clientX - rect.left;
        cloneOffY = e.clientY - rect.top;

        let dragStarted = false;

        function onMove(ev) {
          const dx = ev.clientX - startX, dy = ev.clientY - startY;
          if (!dragStarted && Math.sqrt(dx * dx + dy * dy) < 6) return;
          if (!dragStarted) {
            dragStarted = true;
            dragSrc = card;
            card.classList.add("card-dragging");
            clone = createClone(card);
          }
          ev.preventDefault();
          if (clone) {
            clone.style.left = (ev.clientX - cloneOffX) + "px";
            clone.style.top = (ev.clientY - cloneOffY) + "px";
          }
          // Highlight target
          grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
          if (clone) clone.style.display = "none";
          const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest(".card");
          if (clone) clone.style.display = "";
          if (target && target !== dragSrc) target.classList.add("card-ghost");
        }

        function onUp(ev) {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          if (dragStarted) {
            grid.querySelectorAll(".card-ghost").forEach(c => c.classList.remove("card-ghost"));
            if (clone) clone.style.display = "none";
            const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest(".card");
            if (clone) clone.style.display = "";
            if (target && target !== dragSrc) {
              swapCards(dragSrc, target);
              setTimeout(updatePageSnapshot, 50);
            }
            dragSrc.classList.remove("card-dragging");
            clone?.remove(); clone = null; dragSrc = null;
          } else {
            // Simple click → reveal only this tile
            revealCard(card);
          }
        }
        window.addEventListener("pointermove", onMove, { passive: false });
        window.addEventListener("pointerup", onUp);
      });
    }

    // ─────────────────────────────────────────────────────────────
    // Init
    // ─────────────────────────────────────────────────────────────
    async function fetchAirtable() {
      const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${encodeURIComponent(AIRTABLE_TABLE)}?pageSize=100`;
      const res = await fetch(url, { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } });
      if (!res.ok) throw new Error(`Airtable error ${res.status}`);
      const data = await res.json(); return data.records;
    }

    async function init() {
      const grid = document.getElementById("grid");
      const loading = document.getElementById("loading");

      // Default body class
      document.body.classList.add("lang-ko");

      // Set initial Info Panel text
      updateInfoPanelText();

      // Info Panel logic
      const infoBtn = document.getElementById("info-toggle");
      const infoPanel = document.getElementById("info-panel");
      const infoClose = document.getElementById("info-close");

      infoBtn.onclick = (e) => {
        e.stopPropagation();
        infoPanel.classList.toggle("show");
      };
      infoClose.onclick = (e) => {
        e.stopPropagation();
        infoPanel.classList.remove("show");
      };

      // Language Toggle logic
      const langToggleBtn = document.getElementById("lang-toggle");
      if (langToggleBtn) {
        langToggleBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          activeLang = activeLang === 'en' ? 'ko' : 'en';

          // Toggle class on body
          document.body.className = `lang-${activeLang}`;

          // Update button text
          langToggleBtn.textContent = activeLang === 'en' ? 'EN' : '한';

          // Update all overlays
          updateAllOverlays();

          // Update info panel text
          updateInfoPanelText();

          // Update btn-label texts
          document.querySelectorAll('.btn-label[data-ko][data-en]').forEach(el => {
            el.textContent = el.dataset[activeLang];
          });
          // Update popover menu texts
          document.querySelectorAll('.print-menu-title[data-ko][data-en]').forEach(el => {
            el.textContent = el.dataset[activeLang];
          });
          document.querySelectorAll('.print-menu-opt-btn span[data-ko][data-en]').forEach(el => {
            el.textContent = el.dataset[activeLang];
          });
          document.querySelectorAll('.mini-tag-footer span[data-ko][data-en]').forEach(el => {
            el.textContent = el.dataset[activeLang];
          });

          // Update snapshot
          setTimeout(updatePageSnapshot, 100);
        });
      }

      // Reveal All button
      const revealAllBtn = document.getElementById("reveal-all-btn");
      if (revealAllBtn) {
        revealAllBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          revealAll();
        });
      }

      // Print button click (Toggles Popover Menu)
      const printBtn = document.getElementById("print-btn");
      const printMenu = document.getElementById("print-menu");
      if (printBtn && printMenu) {
        printBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          printMenu.classList.toggle("show");
        });

        // Close menu when clicking outside
        document.addEventListener("click", (e) => {
          if (!printMenu.contains(e.target) && e.target !== printBtn && !printBtn.contains(e.target)) {
            printMenu.classList.remove("show");
          }
        });
      }

      // Print Popover Option Buttons
      const menuPrintBtn = document.getElementById("menu-print-btn");
      const menuDownloadBtn = document.getElementById("menu-download-btn");
      const printPreviewCard = document.getElementById("print-preview-card");

      if (menuPrintBtn) {
        menuPrintBtn.addEventListener("mouseenter", () => {
          if (typeof window.getVisibleTileSrcs === 'function' && typeof window.buildMiniFloorGrid === 'function') {
            const tiles = window.getVisibleTileSrcs();
            window.buildMiniFloorGrid(tiles);
          }

          const doormatImg = document.getElementById('mini-doormat-img');
          if (doormatImg && !doormatImg.getAttribute('src')) {
            const doormats = [
              'assets/image/green doormat.jpg',
              'assets/image/red doormat.jpg'
            ];
            const chosen = doormats[Math.floor(Math.random() * doormats.length)];
            doormatImg.src = chosen;
          }
          if (printPreviewCard) printPreviewCard.classList.add("show");
        });

        menuPrintBtn.addEventListener("mouseleave", () => {
          if (printPreviewCard) printPreviewCard.classList.remove("show");
        });

        menuPrintBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          if (printMenu) printMenu.classList.remove("show");
          if (printPreviewCard) printPreviewCard.classList.remove("show");

          // Pre-build the floor grid BEFORE window.print()
          // so tiles are guaranteed to be populated while #grid is still visible on screen
          if (typeof window.getVisibleTileSrcs === 'function' && typeof window.buildFloorGrid === 'function') {
            const tiles = window.getVisibleTileSrcs();
            console.log('[Print] Pre-building floor grid with', tiles.length, 'tiles');
            window.buildFloorGrid(tiles);
          }



          window.print();
        });
      }

      if (menuDownloadBtn) {
        menuDownloadBtn.addEventListener("mouseenter", () => {
          updateExportTag();
          const tag = document.getElementById("export-tag");
          if (tag) tag.classList.add("show");
        });
        menuDownloadBtn.addEventListener("mouseleave", () => {
          const tag = document.getElementById("export-tag");
          if (tag) tag.classList.remove("show");
        });
        menuDownloadBtn.addEventListener("click", async (e) => {
          e.stopPropagation();
          if (printMenu) printMenu.classList.remove("show");
          if (printPreviewCard) printPreviewCard.classList.remove("show");

          // Hide all control buttons during screenshot
          if (revealAllBtn) revealAllBtn.style.display = "none";
          if (infoBtn) infoBtn.style.display = "none";
          if (printBtn) printBtn.style.display = "none";

          const tag = document.getElementById("export-tag");
          if (tag) {
            tag.classList.add("show");
            tag.style.transition = "none";
          }

          try {
            const canvas = await html2canvas(document.body, {
              y: window.scrollY,
              x: 0,
              width: window.innerWidth,
              height: window.innerHeight,
              backgroundColor: "#0a0a0a",
              useCORS: true,
              scale: 2
            });
            const link = document.createElement("a");
            link.download = `jangpan-collection-${Date.now()}.jpg`;
            link.href = canvas.toDataURL("image/jpeg", 0.95);
            link.click();
          } catch (err) {
            console.error("Screenshot failed:", err);
            alert("다운로드 중 오류가 발생했습니다.");
          }

          // Restore control buttons
          if (revealAllBtn) revealAllBtn.style.display = "flex";
          if (infoBtn) infoBtn.style.display = "flex";
          if (printBtn) printBtn.style.display = "flex";

          if (tag) {
            tag.classList.remove("show");
            tag.style.transition = "";
          }
        });
      }

      try {
        const records = await fetchAirtable();
        loading.style.display = "none";

        // Sort by brightness: compute average luminance of each tile image
        // then sort from light to dark
        async function getImageBrightness(url) {
          return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = () => {
              try {
                const canvas = document.createElement("canvas");
                const size = 32; // Sample at low resolution for speed
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, size, size);
                const data = ctx.getImageData(0, 0, size, size).data;
                let totalLum = 0;
                const pixelCount = size * size;
                for (let i = 0; i < data.length; i += 4) {
                  // Relative luminance: 0.299R + 0.587G + 0.114B
                  totalLum += 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
                }
                resolve(totalLum / pixelCount); // 0 (dark) to 255 (bright)
              } catch (e) {
                resolve(128); // fallback: middle brightness
              }
            };
            img.onerror = () => resolve(128); // fallback
            img.src = url;
          });
        }

        // Calculate brightness for all records with images
        const brightnessMap = new Map();
        const brightnessPromises = records.map(async (record) => {
          const images = record.fields[FIELDS.image];
          if (images && images.length > 0) {
            const brightness = await getImageBrightness(images[0].url);
            brightnessMap.set(record.id, brightness);
          } else {
            brightnessMap.set(record.id, 128); // no image → middle
          }
        });

        await Promise.all(brightnessPromises);

        // Sort: light (high luminance) → dark (low luminance)
        records.sort((a, b) => {
          const aLum = brightnessMap.get(a.id) || 128;
          const bLum = brightnessMap.get(b.id) || 128;
          return bLum - aLum; // descending: brightest first
        });

        records.forEach((record, i) => {
          if (!record.fields[FIELDS.nameEn] && !record.fields[FIELDS.nameKo]) return;
          const card = buildCard(record, i);
          card.classList.add("sweep-in");
          grid.appendChild(card);
          card.addEventListener("animationend", (e) => {
            if (e.animationName === "sweepInAnim") card.classList.remove("sweep-in");
          });
        });

        initDragSwap(grid);
      } catch (err) {
        loading.style.display = "none";
        console.error(err);
      }
    }

    init();
  </script>
